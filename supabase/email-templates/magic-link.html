<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mensaena – Magischer Login-Link</title>
</head>
<body style="margin:0;padding:0;background:#f5f0e8;font-family:'Inter',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f0e8;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
          <tr>
            <td style="background:linear-gradient(135deg,#2d6a4f,#52b788);padding:40px 48px;text-align:center;">
              <div style="font-size:32px;margin-bottom:8px;">✨</div>
              <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:700;">Mensaena</h1>
              <p style="margin:8px 0 0;color:rgba(255,255,255,0.85);font-size:14px;">Dein Login-Link</p>
            </td>
          </tr>
          <tr>
            <td style="padding:48px;">
              <h2 style="margin:0 0 16px;color:#1a3a2a;font-size:22px;font-weight:700;">Hier ist dein magischer Link 🪄</h2>
              <p style="margin:0 0 24px;color:#4a5568;font-size:15px;line-height:1.6;">
                Klicke auf den Button, um dich sofort einzuloggen – kein Passwort nötig!
              </p>
              <div style="text-align:center;margin:32px 0;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:linear-gradient(135deg,#2d6a4f,#52b788);color:#ffffff;text-decoration:none;padding:16px 40px;border-radius:12px;font-size:16px;font-weight:600;box-shadow:0 4px 16px rgba(45,106,79,0.3);">
                  🚀 Jetzt einloggen
                </a>
              </div>
              <p style="margin:24px 0 0;color:#718096;font-size:13px;line-height:1.6;">
                Der Link ist 10 Minuten gültig und kann nur einmal verwendet werden.
              </p>
            </td>
          </tr>
          <tr>
            <td style="background:#f5f0e8;padding:24px 48px;text-align:center;">
              <p style="margin:0;color:#a0aec0;font-size:12px;">© 2025 Mensaena</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
