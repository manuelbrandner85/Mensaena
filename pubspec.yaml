name: mensaena
description: Mensaena – Nachbarschaftshilfe-Plattform. Native Flutter App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.4.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lucide_icons: ^0.257.0
  intl: ^0.20.2
  timeago: ^3.7.0

  # Media
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Storage
  flutter_secure_storage: ^9.2.3
  shared_preferences: ^2.3.3

  # Audio
  audioplayers: ^6.0.0

  # Push Notifications
  firebase_messaging: ^15.1.5
  firebase_core: ^3.8.1

  # Utils
  collection: ^1.18.0
  uuid: ^4.5.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
