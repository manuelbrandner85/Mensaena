<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#059669" />
  <title>Mensaena – Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f9fafb;color:#111827;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
    .logo{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:2.5rem}
    .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#059669,#38a169);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800}
    .logo-text{font-size:1.25rem;font-weight:700;color:#059669;letter-spacing:-.02em}
    .icon-wrapper{width:80px;height:80px;background:#fef3c7;border-radius:1.25rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
    p{color:#6b7280;line-height:1.6;max-width:28rem;margin:0 auto .5rem}
    .btn{display:inline-flex;align-items:center;gap:.5rem;background:#059669;color:#fff;border:none;padding:.75rem 1.5rem;border-radius:.75rem;font-size:.875rem;font-weight:600;cursor:pointer;margin-top:1.5rem;transition:background .2s}
    .btn:hover{background:#047857}
    .tip{margin-top:2rem;font-size:.75rem;color:#9ca3af}
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">M</div>
    <span class="logo-text">Mensaena</span>
  </div>

  <div class="icon-wrapper">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <h1>Du bist offline</h1>
  <p>Es sieht so aus als h&auml;ttest du gerade keine Internetverbindung. Sobald du wieder online bist, kannst du Mensaena wie gewohnt nutzen.</p>

  <button class="btn" onclick="window.location.reload()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Erneut versuchen
  </button>

  <p class="tip">Tipp: Installiere Mensaena als App f&uuml;r ein besseres Offline-Erlebnis.</p>
</body>
</html>
