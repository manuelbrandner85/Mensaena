name: Flutter Android Build

# Baut die Flutter-App im /flutter_app-Verzeichnis als signierte APK.
# CUTOVER: Flutter ersetzt jetzt die Capacitor-WebView-App. Selbe
# applicationId (de.mensaena.app), selber Keystore, Tag `latest` mit
# Filename `mensaena-release.apk` – damit der bestehende Self-Update-
# Flow (version.json.apkUrl) die neue App ausliefert.
# Capacitor-Workflow android.yml ist deaktiviert.
on:
  push:
    branches:
      - main
      - 'claude/capacitor-to-flutter-migration-**'
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # Erforderlich, damit softprops/action-gh-release@v2 das
      # `latest` Release auf main erstellen darf.
      contents: write
      # Damit gh pr comment auf failed builds einen PR-Kommentar posten kann.
      pull-requests: write
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.x'
          cache: true

      - name: Generate native scaffolding (android/)
        run: |
          if [ ! -d android ]; then
            flutter create --project-name mensaena \
                           --org de.mensaena \
                           --platforms=android \
                           --no-pub \
                           .
          fi

          # ── applicationId/namespace: GENERIERT auf de.mensaena.app ──
          # Robuster Python-Patch (statt sed): nimmt jeden bestehenden
          # applicationId/namespace und ersetzt mit de.mensaena.app.
          # Plus Verifikation – bricht den Build ab wenn das Ergebnis
          # nicht stimmt.
          python3 <<'PYEOF'
          import re, os, sys, shutil

          TARGET = "de.mensaena.app"

          # build.gradle(.kts)
          for path in [
              "android/app/build.gradle.kts",
              "android/app/build.gradle",
          ]:
              if not os.path.exists(path):
                  continue
              src = open(path).read()
              src = re.sub(
                  r'(applicationId\s*=?\s*)"[^"]+"',
                  rf'\1"{TARGET}"',
                  src,
              )
              src = re.sub(
                  r'(namespace\s*=?\s*)"[^"]+"',
                  rf'\1"{TARGET}"',
                  src,
              )
              open(path, "w").write(src)
              print(f"PATCHED {path}: applicationId/namespace → {TARGET}")

          # Kotlin/Java MainActivity-Verzeichnis nach de/mensaena/app
          for base in ["android/app/src/main/kotlin", "android/app/src/main/java"]:
              if not os.path.isdir(base):
                  continue
              # Zielverzeichnis erstellen
              target_dir = os.path.join(base, "de", "mensaena", "app")
              os.makedirs(target_dir, exist_ok=True)
              # Alle MainActivity.* aus alten Verzeichnissen finden
              for root, _, files in os.walk(base):
                  for f in files:
                      if f.endswith(".kt") or f.endswith(".java"):
                          src_path = os.path.join(root, f)
                          if root != target_dir:
                              dst_path = os.path.join(target_dir, f)
                              shutil.move(src_path, dst_path)
                              print(f"MOVED {src_path} → {dst_path}")
              # package-Deklaration korrigieren
              for f in os.listdir(target_dir):
                  full = os.path.join(target_dir, f)
                  if not f.endswith((".kt", ".java")):
                      continue
                  c = open(full).read()
                  c = re.sub(r'^package\s+[^\s;]+', f'package {TARGET}', c, flags=re.MULTILINE)
                  open(full, "w").write(c)
                  print(f"REWROTE package in {full} → {TARGET}")

          # Leere Old-Verzeichnisse aufräumen
          for base in ["android/app/src/main/kotlin/de/mensaena", "android/app/src/main/java/de/mensaena"]:
              if not os.path.isdir(base):
                  continue
              for sub in os.listdir(base):
                  full = os.path.join(base, sub)
                  if os.path.isdir(full) and sub != "app":
                      try:
                          shutil.rmtree(full)
                          print(f"REMOVED empty dir {full}")
                      except Exception as e:
                          print(f"WARN: could not remove {full}: {e}")
          PYEOF

          echo "── Verifikation Kotlin-Files ──"
          find android/app/src/main/kotlin -type f -name '*.kt' -exec sh -c 'echo "FILE: $1"; head -3 "$1"' _ {} \;
          echo "── Verifikation build.gradle(.kts) ──"
          grep -E "applicationId|namespace" android/app/build.gradle.kts 2>/dev/null || \
            grep -E "applicationId|namespace" android/app/build.gradle 2>/dev/null || true

          # Hard-Fail wenn applicationId nicht stimmt
          if ! grep -q "de\.mensaena\.app" android/app/build.gradle.kts 2>/dev/null && \
             ! grep -q "de\.mensaena\.app" android/app/build.gradle 2>/dev/null; then
            echo "::error::applicationId-Patch fehlgeschlagen – build.gradle enthält de.mensaena.app NICHT"
            exit 1
          fi

          # ── INTERNET-Permission + Backup-Reset ins Release-Manifest patchen ──
          # 1. Permissions: flutter create generiert INTERNET nur im debug-
          #    Overlay, nicht im release. Ohne INTERNET → keine Supabase-Calls.
          # 2. android:allowBackup="false" + dataExtractionRules: verhindert
          #    dass Capacitor-WebView-Daten beim Upgrade migriert werden und
          #    den Flutter-Storage kontaminieren.
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if [ -f "$MANIFEST" ]; then
            python3 <<'PYEOF'
          import re
          path = "android/app/src/main/AndroidManifest.xml"
          src = open(path).read()
          if "android.permission.INTERNET" not in src:
              perms = (
                  '    <uses-permission android:name="android.permission.INTERNET"/>\n'
                  '    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n'
                  '    <uses-permission android:name="android.permission.CAMERA"/>\n'
                  '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n'
                  '    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n'
                  '    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n'
                  '    <uses-permission android:name="android.permission.VIBRATE"/>\n'
                  '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n'
                  '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n'
                  '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n'
              )
              src = re.sub(r'(<manifest[^>]*>)\n', r'\1\n' + perms, src, count=1)
              print("✅ Permissions hinzugefügt")
          # allowBackup=false damit Capacitor-Daten beim Upgrade NICHT
          # auf die Flutter-App übertragen werden
          if 'android:allowBackup' not in src:
              src = re.sub(
                  r'(<application\s+)',
                  r'\1android:allowBackup="false" tools:replace="android:allowBackup"\n        ',
                  src,
                  count=1,
              )
              print("✅ android:allowBackup='false' gesetzt – keine Capacitor-Daten-Migration")
          # tools:-Namespace muss im manifest-Tag deklariert sein
          if 'xmlns:tools' not in src:
              src = src.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android"',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android"\n    xmlns:tools="http://schemas.android.com/tools"',
                  1,
              )
              print("✅ xmlns:tools hinzugefügt")
          open(path, "w").write(src)
          PYEOF
            echo "── AndroidManifest.xml Inhalt: ──"
            cat "$MANIFEST"
          fi

          # Plugin-Kompatibilität sicherstellen: Kotlin 1.9.22 + minSdk 24
          # (Firebase + LiveKit + mobile_scanner verlangen das).
          # Die exakten Versionen können mit Flutter-Updates wandern – diese
          # Patches überschreiben nur, wenn die Defaults zu alt sind.
          if [ -f android/settings.gradle ]; then
            sed -i 's|id "org.jetbrains.kotlin.android" version "[^"]*"|id "org.jetbrains.kotlin.android" version "1.9.22"|g' android/settings.gradle
          fi
          if [ -f android/settings.gradle.kts ]; then
            sed -i 's|id("org.jetbrains.kotlin.android") version "[^"]*"|id("org.jetbrains.kotlin.android") version "1.9.22"|g' android/settings.gradle.kts
          fi

          # ── compileSdk ≥ 35 + minSdk 24 erzwingen (flutter_sound braucht 24) ──
          # livekit_client benötigt das `lStar`-Attribut (Android 12 / API 31+).
          # Wenn wir compileSdk hochziehen, MUSS das auch für alle Plugin-
          # Subprojekte gelten – sonst schlägt ":livekit_client:verifyReleaseResources"
          # mit AAPT-Fehler "resource android:attr/lStar not found" fehl.
          if [ -f android/app/build.gradle ]; then
            sed -i 's|minSdkVersion flutter.minSdkVersion|minSdkVersion 24|g; s|minSdk = flutter.minSdkVersion|minSdk = 24|g' android/app/build.gradle
            sed -i 's|compileSdkVersion flutter.compileSdkVersion|compileSdkVersion 35|g; s|compileSdk = flutter.compileSdkVersion|compileSdk = 35|g; s|compileSdk flutter.compileSdkVersion|compileSdk 35|g' android/app/build.gradle
          fi
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's|minSdk = flutter.minSdkVersion|minSdk = 24|g' android/app/build.gradle.kts
            sed -i 's|compileSdk = flutter.compileSdkVersion|compileSdk = 35|g' android/app/build.gradle.kts
          fi

          # ── Plugin-Subprojekte (z.B. :livekit_client) auf compileSdk 35 zwingen ──
          # gradle.beforeProject registriert den afterEvaluate-Hook BEVOR das
          # jeweilige Subprojekt evaluiert wird – das vermeidet den Gradle-8-Fehler
          # "Cannot run Project.afterEvaluate when the project is already evaluated".
          if [ -f android/build.gradle ] && ! grep -q "compileSdkVersion 35" android/build.gradle; then
            {
              echo ""
              echo "gradle.beforeProject { proj ->"
              echo "    proj.afterEvaluate {"
              echo "        if (proj.hasProperty('android')) {"
              echo "            proj.android { compileSdkVersion 35 }"
              echo "        }"
              echo "    }"
              echo "}"
            } >> android/build.gradle
            echo "build.gradle: beforeProject hook appended"
          fi
          if [ -f android/build.gradle.kts ] && ! grep -q "compileSdk = 35" android/build.gradle.kts; then
            {
              echo ""
              echo 'gradle.beforeProject {'
              echo '    afterEvaluate {'
              echo '        extensions.findByName("android")?.let { ext ->'
              echo '            if (ext is com.android.build.gradle.BaseExtension) {'
              echo '                ext.compileSdkVersion(35)'
              echo '            }'
              echo '        }'
              echo '    }'
              echo '}'
            } >> android/build.gradle.kts
            echo "build.gradle.kts: beforeProject hook appended"
          fi

          echo "--- android/settings.gradle(.kts) ---"
          cat android/settings.gradle 2>/dev/null || cat android/settings.gradle.kts 2>/dev/null || true
          echo "--- android/build.gradle(.kts) ---"
          cat android/build.gradle 2>/dev/null || cat android/build.gradle.kts 2>/dev/null || true

      - name: Pub get
        run: flutter pub get

      # ── Firebase Cloud Messaging: google-services.json aus GitHub-Secret ──
      # GOOGLE_SERVICES_JSON enthält den kompletten JSON-Inhalt der vom
      # Firebase-Console heruntergeladenen Datei. Wird in android/app/
      # geschrieben damit das com.google.gms.google-services Gradle-Plugin
      # sie findet.
      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error title=GOOGLE_SERVICES_JSON secret fehlt::Firebase Cloud Messaging braucht google-services.json. Trag den kompletten JSON-Inhalt aus dem Firebase-Console-Download als Repo-Secret GOOGLE_SERVICES_JSON ein."
            exit 1
          fi
          mkdir -p android/app
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          python3 -c "import json; json.load(open('android/app/google-services.json'))" \
            && echo "google-services.json OK"

      # Launcher-Icons aus assets/launcher/icon.png generieren
      # (legacy + adaptive Android-Icons in den richtigen Resource-Dirs).
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze
        run: |
          set +e
          flutter analyze --no-fatal-infos 2>&1 | tee analyze.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            grep -E "^[[:space:]]*(error|warning|info)" analyze.log | head -30 | while IFS= read -r line; do
              clean=$(echo "$line" | sed -E 's/^[[:space:]]*(error|warning|info)[[:space:]]*-[[:space:]]*//')
              echo "::error title=Analyzer::${clean}"
            done
          fi
          exit $rc

      - name: Test
        run: flutter test || echo "Keine Tests vorhanden"

      # ── Signing: Keystore aus Secrets wiederherstellen ───────────────────
      # Identische Secrets wie android.yml (Capacitor), damit Flutter- und
      # Capacitor-APK denselben Fingerprint behalten und Side-by-Side-Updates
      # auf demselben Gerät möglich bleiben.
      - name: Validate Android signing secrets
        env:
          KS_B64:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for var in KS_B64 KS_PASS KEY_ALIAS KEY_PASS; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::ANDROID_${var#KS_} fehlt"
              missing=1
            fi
          done
          exit $missing

      # Weltenbibliothek-Pattern: Keystore liegt in android/app/, key.properties
      # referenziert relativ "app/mensaena.jks" → kein RUNNER_TEMP-Pfad nötig.
      # build.gradle.kts (im Repo committed) liest key.properties via
      # rootProject.file(...) und enabled signingConfigs.create("release") nur
      # dann wenn storeFile-Property nicht leer ist.
      - name: Restore keystore + write key.properties
        env:
          KS_B64:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          # 1) Keystore dekodieren nach android/app/mensaena.jks
          python3 -c "import os,base64,re,sys; raw=os.environ['KS_B64']; clean=re.sub(r'[^A-Za-z0-9+/=]','',raw).rstrip('='); d=base64.b64decode(clean+'='*(-len(clean)%4)); open('android/app/mensaena.jks','wb').write(d); valid=d[:4]==b'\xfe\xed\xfe\xed' or d[:2]==b'\x30\x82'; print('Keystore:',len(d),'bytes valid=',valid); sys.exit('Invalid keystore – ANDROID_KEYSTORE_BASE64 ist korrupt') if not valid else None"
          # 2) key.properties mit RELATIVEM Pfad (rootProject.file() resolvt relativ zu android/)
          cat > android/key.properties <<EOF
          storeFile=app/mensaena.jks
          storePassword=${KS_PASS}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASS}
          EOF
          echo "✅ Release-Keystore + key.properties erstellt"

      # ── Shorebird CLI (für Release-Build, gleiche Engine wie Patches) ──
      # Weltenbibliothek-Pattern: APK wird via `shorebird release android
      # --artifact=apk` gebaut, NICHT mehr `flutter build apk`. Damit wird
      # das Release direkt bei Shorebird registriert (= shorebird_patch.yml
      # findet es automatisch) und die Engine-Snapshots matchen zwischen
      # Release-APK und späteren Patches.
      # CLI-Version gepinnt auf 1.6.92 (= shorebird_patch.yml).
      - name: 🐦 Shorebird
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: shorebirdtech/setup-shorebird@v1
        with:
          shorebird-version: 1.6.92

      - name: 🏗️ Build signed Release APK (via Shorebird)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          shorebird release android \
            --artifact=apk \
            --no-confirm \
            -- \
            --target-platform=android-arm64,android-arm \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://huaqldjkgyosefzfhjnf.supabase.co' }} \
            --dart-define=API_BASE_URL=https://www.mensaena.de \
            2>&1 | tee build.log
          rc=${PIPESTATUS[0]}
          # Exit-Code 70 = Release ist auf Shorebird-Server bereits registriert
          # (z.B. nach Workflow-Re-Run nach partial fail). In diesem Fall hat
          # Shorebird KEINE APK gebaut → wir müssen mit `flutter build apk` nachholen.
          if [ $rc -eq 70 ]; then
            echo "⚠️  Shorebird: Release bereits registriert — baue APK direkt mit Flutter."
            rc=0
          fi
          # Sicher gehen dass die APK an der erwarteten Stelle liegt. Wenn
          # Shorebird sie nicht produziert hat (Skip-Path) bauen wir sie hier.
          if [ ! -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "ℹ️  APK nicht von Shorebird gebaut — fallback auf flutter build apk"
            flutter build apk --release \
              --target-platform=android-arm64,android-arm \
              --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://huaqldjkgyosefzfhjnf.supabase.co' }} \
              --dart-define=API_BASE_URL=https://www.mensaena.de
            rc=$?
          fi
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "(no flutter-apk/ dir)"
          exit $rc

      # Non-Main-Builds (PR + Feature-Branch) → klassischer flutter build apk
      # damit Branch-Pushes/PRs CI-grün laufen ohne Shorebird-Release zu erzeugen.
      - name: 🏗️ Build signed Release APK (Branch/PR)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://huaqldjkgyosefzfhjnf.supabase.co' }} \
            --dart-define=API_BASE_URL=https://www.mensaena.de \
            2>&1 | tee build.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ] && [ -n "$PR_NUMBER" ]; then
            {
              printf '## ❌ Build failed (run %s)\n\n' "$GITHUB_RUN_ID"
              printf '### Last 200 lines of `flutter build apk --release`\n\n'
              printf '```\n'
              tail -200 build.log
              printf '\n```\n'
            } > /tmp/pr_comment.md
            gh pr comment "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file /tmp/pr_comment.md || true
          fi
          exit $rc

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: mensaena-flutter-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # ── GitHub Release: stable public download URL (nur auf main) ─────────
      # CUTOVER: Flutter ersetzt Capacitor. Tag `latest`, Filename
      # mensaena-release.apk – matched die bisherige Capacitor-URL, damit
      # alle bestehenden Download-Links und der Self-Update-Flow im Web
      # (version.json.apkUrl) die neue Flutter-App ausliefern.
      # ── APK doppelt benennen ─────────────────────────────────────────────
      # 1. mensaena-v{VERSION}.apk → bleibt im jeweiligen Release-Tag erhalten,
      #    sodass User auf älteren Versionen ihre APK weiterhin nachladen können.
      # 2. mensaena-release.apk → fester Filename für Self-Update-Links
      #    (version.json.apkUrl) → zeigt immer auf das `latest`-Release.
      # Beide werden gleichzeitig publiziert.
      - name: Rename APK for release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: apk
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | tr -d ' ')
          # Tag-Name: replace `+` mit `-` (GitHub-Tag erlaubt kein `+`)
          TAG="v${VERSION//+/-}"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "$GITHUB_WORKSPACE/mensaena-v${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "$GITHUB_WORKSPACE/mensaena-release.apk"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "Files:"
          ls -la "$GITHUB_WORKSPACE"/mensaena-*.apk

      # Pro Version eigenes GitHub Release (versionierte APK bleibt
      # für ältere Installs erreichbar).
      - name: Publish versioned GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk.outputs.tag }}
          name: Mensaena ${{ steps.apk.outputs.version }}
          body: |
            Mensaena Android APK ${{ steps.apk.outputs.version }} – automatisch gebaut aus `main`.

            **Versioned download:** [`mensaena-v${{ steps.apk.outputs.version }}.apk`](https://github.com/${{ github.repository }}/releases/download/${{ steps.apk.outputs.tag }}/mensaena-v${{ steps.apk.outputs.version }}.apk)

            * applicationId: `de.mensaena.app`
            * Commit: `${{ github.sha }}`
            * Run: ${{ github.run_number }}
          files: |
            mensaena-v${{ steps.apk.outputs.version }}.apk
          prerelease: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Plus stabiles `latest`-Release für den Self-Update-Flow:
      # mensaena-release.apk-Filename bleibt konstant.
      - name: Publish latest GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Mensaena (latest build)
          body: |
            Mensaena Android APK – automatisch gebaut aus `main`.

            **Direct download:** [`mensaena-release.apk`](https://github.com/${{ github.repository }}/releases/latest/download/mensaena-release.apk)

            * Aktuelle Version: ${{ steps.apk.outputs.version }}
            * Versionierte Releases: https://github.com/${{ github.repository }}/releases
          files: mensaena-release.apk
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── app_releases-Eintrag (APK Release, evtl. mandatory) ─────────────
      # Pendant zu shorebird_patch.yml's Insert. flutter.yml ist verantwortlich
      # für is_patch=false-Rows mit der versionierten APK-URL. Mandatory-Flag
      # wird aus Commit-Keywords abgeleitet:
      #   `[mandatory]`, `[force-update]`, `BREAKING:`, `BREAKING CHANGE:`
      # → blockiert UI in der Flutter-App bis User die neue APK installiert hat.
      #
      # Verwendet Supabase PostgREST mit SERVICE_ROLE_KEY (bypasst RLS) statt
      # psql/pooler — robust gegen IPv6/Pooler-Probleme.
      - name: app_releases-Eintrag (APK)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        env:
          SUPABASE_URL: https://huaqldjkgyosefzfhjnf.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FULL: ${{ steps.apk.outputs.version }}
          TAG: ${{ steps.apk.outputs.tag }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY nicht gesetzt — überspringe app_releases insert"
            exit 0
          fi
          BUILD=$(echo "$FULL" | sed 's/.*+//')

          TITLE=$(git log -1 --pretty=%s | sed 's/^[a-z]*([a-z]*): //' | head -c 100)
          BODY=$(git log -1 --pretty=%b | head -c 240 | tr '\n' ' ')

          # Force-Update-Detection: Keyword im Commit-Subject ODER -Body.
          if git log -1 --pretty=%B | grep -iqE '\[mandatory\]|\[force-update\]|BREAKING( CHANGE)?:'; then
            MANDATORY=true
            echo "🚨 Pflicht-Update markiert"
          else
            MANDATORY=false
          fi

          APK_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/mensaena-v${FULL}.apk"

          # JSON sauber via jq bauen (escaping korrekt, keine SQL-Injection-Sorgen)
          PAYLOAD=$(jq -n \
            --arg v "$FULL" \
            --argjson b "$BUILD" \
            --argjson m "$MANDATORY" \
            --arg url "$APK_URL" \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            '{
              version: $v,
              build_number: $b,
              mandatory: $m,
              is_patch: false,
              apk_url: $url,
              platform: "android",
              changelog: { entries: [{ type: "feature", title: $title, description: $body }] }
            }')

          # PostgREST upsert via on_conflict-Param (Pendant zu psql ON CONFLICT)
          HTTP_CODE=$(curl -sS -o /tmp/ar_resp.json -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/app_releases?on_conflict=version" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ app_releases-Eintrag für $FULL (APK, mandatory=$MANDATORY) gespeichert."
            cat /tmp/ar_resp.json | head -c 400 || true
          else
            echo "::error::app_releases-Insert fehlgeschlagen (HTTP $HTTP_CODE)"
            cat /tmp/ar_resp.json || true
            exit 1
          fi
