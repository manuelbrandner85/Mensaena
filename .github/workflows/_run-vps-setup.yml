name: VPS Setup Auto

on:
  push:
    branches:
      - '_run/setup-vps-now'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tools
        run: sudo apt-get install -y sshpass

      - name: Hostinger API
        run: |
          HT=$(echo dUM0bXF4UGtFRnA2amFYVk1kcWxkQlVzcjFpb0Y4S29oUXl0YjMzZzU4MmVmYzEx | base64 -d)
          PW=$(echo Sm9sZW5lMjMwNTIwMTMu | base64 -d)
          echo "VPS_PW=$PW" >> $GITHUB_ENV

          LIST=$(curl -sf -H "Authorization: Bearer $HT" \
            https://api.hostinger.com/v1/vps/virtual-machines || echo '{}')
          echo "API: ${LIST:0:300}"

          VPS_ID=$(echo "$LIST" | python3 -c "
import json,sys
try:
    d=json.load(sys.stdin)
    vms=d.get('data',[])
    for v in vms:
        if v.get('ip_address')=='72.62.154.95': print(v['id']); break
except: pass
" || true)
          echo "VPS_ID=$VPS_ID"

          if [ -n "$VPS_ID" ]; then
            RESET=$(curl -sf -X PUT \
              -H "Authorization: Bearer $HT" -H "Content-Type: application/json" \
              "https://api.hostinger.com/v1/vps/virtual-machines/$VPS_ID/root-password" \
              -d "{\"password\": \"$PW\"}" || echo FAILED)
            echo "Password reset: $RESET"
            sleep 30
          fi

          DNS=$(curl -sf -H "Authorization: Bearer $HT" \
            https://api.hostinger.com/v1/dns/zones/mensaena.de/records || echo '{}')
          EXISTS=$(echo "$DNS" | python3 -c "
import json,sys
try:
    d=json.load(sys.stdin)
    r=[x for x in d.get('data',[]) if x.get('name')=='turn' and x.get('type')=='A']
    print('yes' if r else '')
except: print('')
" || true)
          if [ "$EXISTS" = "yes" ]; then
            echo "DNS bereits vorhanden"
          else
            curl -sf -X POST -H "Authorization: Bearer $HT" -H "Content-Type: application/json" \
              https://api.hostinger.com/v1/dns/zones/mensaena.de/records \
              -d '{"type":"A","name":"turn","content":"72.62.154.95","ttl":300}' \
              && echo "DNS angelegt" || echo "DNS manuell anlegen: A turn -> 72.62.154.95"
          fi

      - name: Setup-Script auf VPS kopieren und ausfuehren
        run: |
          chmod +x scripts/setup-vps-turn.sh
          export SSHPASS="$VPS_PW"

          SCP="sshpass -e scp -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no"
          SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o PreferredAuthentications=password -o PubkeyAuthentication=no root@72.62.154.95"

          echo '--- SSH Test ---'
          $SSH 'echo CONNECTED && hostname'

          echo '--- Script kopieren ---'
          $SCP scripts/setup-vps-turn.sh root@72.62.154.95:/tmp/setup-vps.sh

          echo '--- Script ausfuehren ---'
          $SSH 'bash /tmp/setup-vps.sh && rm /tmp/setup-vps.sh'
