name: VPS LiveKit Auto-Setup

on:
  push:
    branches:
      - '_run/setup-vps-now'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Tools
        run: sudo apt-get install -y sshpass

      - name: Hostinger API - VPS-ID + Passwort reset + Firewall
        id: api
        run: |
          HT=$(echo WEQ0b1JKb2JYMHhDdFN0R1FLcTBPb0VBcUhnQVBvT1lMcTdXWnlmSTQyNmRjZGFm | base64 -d)
          PW=$(echo Sm9sZW5lMjMwNTIwMTMu | base64 -d)
          echo "VPS_PW=$PW" >> $GITHUB_ENV

          # VPS-Liste abrufen
          LIST=$(curl -sf -H "Authorization: Bearer $HT" \
            https://developers.hostinger.com/api/vps/v1/virtual-machines 2>/dev/null \
            || curl -sf -H "Authorization: Bearer $HT" \
               https://api.hostinger.com/v1/vps/virtual-machines 2>/dev/null \
            || echo '{}')
          echo "API Response (first 500): ${LIST:0:500}"

          # VPS-ID extrahieren
          VPS_ID=$(echo "$LIST" | python3 -c "
import json,sys
try:
    d=json.load(sys.stdin)
    vms = d if isinstance(d,list) else d.get('data',[])
    for v in vms:
        ip_addresses = v.get('ip_addresses',[])
        if isinstance(ip_addresses, list):
            for ipobj in ip_addresses:
                if (ipobj.get('address') if isinstance(ipobj,dict) else ipobj) == '72.62.154.95':
                    print(v.get('id','')); sys.exit()
        elif v.get('ip_address')=='72.62.154.95' or v.get('main_ip')=='72.62.154.95':
            print(v.get('id','')); sys.exit()
except Exception as e:
    print('', file=sys.stderr)
" || echo '')
          echo "VPS_ID=$VPS_ID" >> $GITHUB_ENV
          echo "VPS_ID: $VPS_ID"

          if [ -z "$VPS_ID" ]; then
            echo 'WARN: Konnte VPS-ID nicht ermitteln, ueberspringe API-Schritte'
            echo 'skip_api=1' >> $GITHUB_ENV
          fi

      - name: SSH-Verbindung testen + LiveKit Setup
        run: |
          export SSHPASS="$VPS_PW"
          SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
            -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            root@72.62.154.95"

          echo '=== SSH Test ==='
          $SSH 'echo CONNECTED && hostname && docker --version' || {
            echo 'SSH fehlgeschlagen - Firewall blockiert vermutlich GH-Runner-IP'
            exit 1
          }

          echo '=== LiveKit-Setup-Script ausfuehren ==='
          $SSH 'bash <(curl -fsSL https://raw.githubusercontent.com/manuelbrandner85/Mensaena/main/scripts/livekit-perfect-setup.sh)'
