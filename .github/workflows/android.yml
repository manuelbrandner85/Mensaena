name: Build APK & F-Droid Repo

on:
  push:
    branches:
      - main
    # Wenn die CI selbst public/fdroid/repo/ updated, triggert das KEIN zweites
    # Run (sonst Loop). Wir committen zusätzlich mit [skip ci] im Message als Gürtel+Hosenträger.
    paths-ignore:
      - 'public/fdroid/**'
  workflow_dispatch:

permissions:
  # contents: write – für GitHub Release + für Commit-Back in public/fdroid/repo
  contents: write

jobs:
  build-apk-and-fdroid:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Job-level env: Step-level env ist NICHT im if: des gleichen Steps verfügbar
    # (https://docs.github.com/en/actions/learn-github-actions/contexts#context-availability).
    # Deshalb hier auf Job-Level damit `if: env.GOOGLE_SERVICES_JSON != ''` korrekt evaluiert.
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Wir pushen am Ende zurück – braucht Token mit write + kein Shallow
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python (für fdroidserver)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Retry bei transient network issues (z.B. sharp/libvips binary download
        # timeouts via @capacitor/assets). Bis zu 3 Versuche mit 20s Pause.
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              echo "::notice::npm ci succeeded on attempt $attempt"
              exit 0
            fi
            echo "::warning::npm ci failed (attempt $attempt/3) – retrying in 20s"
            rm -rf node_modules
            sleep 20
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1

      # ── Capacitor & APK Build ────────────────────────────────────────────
      # Capacitor lädt die Live-Website (server.url) – kein Next.js-Build nötig.
      # public/index.html wird als Platzhalter erstellt, damit cap sync zufrieden ist.
      - name: Create webDir placeholder for cap sync
        run: |
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=https://www.mensaena.de"></head></html>' \
            > public/index.html

      - name: Initialize Android project
        run: npx cap add android

      # ── KRITISCH: Capacitor's MessagingService ENTFERNEN bevor cap sync ──
      # Sonst kollidiert Capacitor's MessagingService mit unserem MensaenaCallService.
      # Beide registrieren sich für com.google.firebase.MESSAGING_EVENT → Firebase
      # liefert die FCM nur an EINEN Service, in der Praxis Capacitor's (zuerst registriert).
      # Resultat: nur Standard-Notification statt CallStyle mit Annehmen/Ablehnen.
      # tools:node="remove" funktioniert hier NICHT zuverlässig im Manifest-Merger.
      # Lösung: Plugin-Manifest direkt editieren BEVOR cap sync die Datei kopiert.
      - name: Disable Capacitor's MessagingService in plugin manifest
        run: |
          PLUGIN="node_modules/@capacitor/push-notifications/android/src/main/AndroidManifest.xml"
          if [ -f "$PLUGIN" ]; then
            python3 <<PYEOF
          import re
          path = "$PLUGIN"
          content = open(path).read()
          # Plugin-Manifest nutzt vollen Package-Pfad: com.capacitorjs.plugins.pushnotifications.MessagingService
          # (NICHT .MessagingService Kurzform). Match also flexibel auf den Klassennamen.
          new_content = re.sub(
              r'<service[^>]*MessagingService[^>]*>.*?</service>',
              '<!-- MessagingService removed by Mensaena – replaced by MensaenaCallService -->',
              content, flags=re.DOTALL
          )
          if new_content != content:
              open(path, 'w').write(new_content)
              print("✅ Capacitor MessagingService removed from plugin manifest")
          else:
              print("❌ FAIL: MessagingService block not found – regex broken!")
              print("Plugin manifest content:")
              print(content)
              import sys; sys.exit(1)
          PYEOF
          else
            echo "❌ FAIL: Plugin manifest not found at $PLUGIN"
            exit 1
          fi

      - name: Sync Capacitor config
        run: npx cap sync android

      - name: Patch AndroidManifest – WebRTC permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'android.permission.CAMERA' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n</manifest>|' "$MANIFEST"
            echo "✅ Camera permission added"
          fi
          if ! grep -q 'android.permission.RECORD_AUDIO' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n</manifest>|' "$MANIFEST"
            echo "✅ RECORD_AUDIO permission added"
          fi
          if ! grep -q 'android.permission.MODIFY_AUDIO_SETTINGS' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n</manifest>|' "$MANIFEST"
            echo "✅ MODIFY_AUDIO_SETTINGS permission added"
          fi
          # ── Phase 2: Full-Screen Incoming Calls (WhatsApp-style) ──
          if ! grep -q 'android.permission.USE_FULL_SCREEN_INTENT' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />\n</manifest>|' "$MANIFEST"
            echo "✅ USE_FULL_SCREEN_INTENT permission added"
          fi
          if ! grep -q 'android.permission.WAKE_LOCK' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.WAKE_LOCK" />\n</manifest>|' "$MANIFEST"
            echo "✅ WAKE_LOCK permission added"
          fi
          if ! grep -q 'android.permission.VIBRATE' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.VIBRATE" />\n</manifest>|' "$MANIFEST"
            echo "✅ VIBRATE permission added"
          fi
          if ! grep -q 'android.permission.FOREGROUND_SERVICE' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n</manifest>|' "$MANIFEST"
            echo "✅ FOREGROUND_SERVICE permission added"
          fi
          if ! grep -q 'FOREGROUND_SERVICE_PHONE_CALL' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_PHONE_CALL" />\n</manifest>|' "$MANIFEST"
            echo "✅ FOREGROUND_SERVICE_PHONE_CALL permission added"
          fi
          if ! grep -q 'android.permission.MANAGE_OWN_CALLS' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.MANAGE_OWN_CALLS" />\n</manifest>|' "$MANIFEST"
            echo "✅ MANAGE_OWN_CALLS permission added"
          fi
          # SYSTEM_ALERT_WINDOW = Overlay-Permission. Erlaubt startActivity() aus
          # Background-Service auch bei entsperrtem Screen (WhatsApp-Pattern).
          # Ohne diese Permission zeigt Android 10+ nur Heads-up-Notification.
          if ! grep -q 'android.permission.SYSTEM_ALERT_WINDOW' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />\n</manifest>|' "$MANIFEST"
            echo "✅ SYSTEM_ALERT_WINDOW permission added"
          fi
          # MainActivity launchMode = singleTop + showWhenLocked attributes
          if ! grep -q 'android:showWhenLocked' "$MANIFEST"; then
            sed -i 's|<activity|<activity\n            android:showWhenLocked="true"\n            android:turnScreenOn="true"|' "$MANIFEST"
            echo "✅ showWhenLocked + turnScreenOn added to MainActivity"
          fi
          # Register MensaenaCallService + IncomingCallService + IncomingCallActivity
          if ! grep -q 'MensaenaCallService' "$MANIFEST"; then
            # Add tools namespace if missing
            sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |' "$MANIFEST"
            # Disable @capacitor's MessagingService, register ours + the foreground service + native call activity
            sed -i 's|</application>|        <service android:name="com.capacitorjs.plugins.pushnotifications.MessagingService" tools:node="remove" />\n        <service android:name="de.mensaena.app.MensaenaCallService" android:exported="false">\n            <intent-filter android:priority="1">\n                <action android:name="com.google.firebase.MESSAGING_EVENT" />\n            </intent-filter>\n        </service>\n        <service android:name="de.mensaena.app.IncomingCallService" android:foregroundServiceType="phoneCall" android:exported="false" />\n        <activity android:name="de.mensaena.app.IncomingCallActivity" android:exported="false" android:showWhenLocked="true" android:turnScreenOn="true" android:excludeFromRecents="true" android:launchMode="singleInstance" android:taskAffinity="" android:theme="@style/Theme.Mensaena.IncomingCall" android:screenOrientation="portrait" />\n        <receiver android:name="de.mensaena.app.CallDeclineReceiver" android:exported="false">\n            <intent-filter>\n                <action android:name="de.mensaena.DECLINE_CALL" />\n            </intent-filter>\n        </receiver>\n    </application>|' "$MANIFEST"
            echo "✅ MensaenaCallService + IncomingCallService + IncomingCallActivity + CallDeclineReceiver registered"
          fi

      - name: Patch app/build.gradle – add firebase-messaging dependency
        run: |
          GRADLE="android/app/build.gradle"
          if ! grep -q 'firebase-messaging' "$GRADLE"; then
            # Insert dependency in the dependencies block (after the opening brace)
            sed -i '/^dependencies {/a\    implementation "com.google.firebase:firebase-messaging:23.4.1"' "$GRADLE"
            echo "✅ firebase-messaging dependency added to app/build.gradle"
            grep -A1 'firebase-messaging' "$GRADLE"
          fi

      # ── Phase 2: Custom FCM Service + Foreground Service für Incoming Calls ──
      # NOTE: Java content MUST be indented by 10 spaces so YAML block scalar
      # stays valid. GitHub Actions strips those 10 spaces before passing to
      # bash, so the shell sees column-0 Java and a column-0 EOF terminator.
      - name: Create MensaenaCallService.java – starts IncomingCallService on data-only FCM
        run: |
          SERVICE="android/app/src/main/java/de/mensaena/app/MensaenaCallService.java"
          mkdir -p "$(dirname "$SERVICE")"
          cat > "$SERVICE" <<'EOF'
          package de.mensaena.app;
          import android.app.ActivityManager;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;
          import android.util.Log;
          import com.capacitorjs.plugins.pushnotifications.MessagingService;
          import com.google.firebase.messaging.RemoteMessage;
          import java.util.List;
          import java.util.Map;
          public class MensaenaCallService extends MessagingService {
              private static final String TAG = "MensaenaCallSvc";
              @Override
              public void onMessageReceived(RemoteMessage remoteMessage) {
                  Map<String, String> data = remoteMessage.getData();
                  String type = data != null ? data.get("type") : null;
                  Log.i(TAG, "FCM received: type=" + type + " keys=" + (data != null ? data.keySet() : "null"));
                  if ("incoming_call".equals(type)) {
                      Log.i(TAG, "Starting IncomingCallService for call_id=" + (data != null ? data.get("call_id") : "?"));
                      // WhatsApp-Pattern: IMMER native IncomingCallActivity zeigen,
                      // auch wenn App im Vordergrund ist. Web-Overlay wird in
                      // DashboardShell nur für Browser/PWA gerendert (is-native check).
                      Intent si = new Intent(this, IncomingCallService.class);
                      si.putExtra("caller_name",   getOrDef(data, "caller_name",   "Anrufer"));
                      si.putExtra("caller_avatar", getOrDef(data, "caller_avatar", ""));
                      si.putExtra("call_type",     getOrDef(data, "call_type",     "audio"));
                      si.putExtra("call_id",       getOrDef(data, "call_id",       "0"));
                      si.putExtra("conv_id",       getOrDef(data, "conversation_id", ""));
                      si.putExtra("room_name",     getOrDef(data, "room_name",     ""));
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          startForegroundService(si);
                      } else {
                          startService(si);
                      }
                      return;
                  }
                  super.onMessageReceived(remoteMessage);
              }
              private boolean isAppInForeground() {
                  try {
                      ActivityManager am = (ActivityManager) getSystemService(Context.ACTIVITY_SERVICE);
                      if (am == null) return false;
                      List<ActivityManager.RunningAppProcessInfo> procs = am.getRunningAppProcesses();
                      if (procs == null) return false;
                      String pkg = getPackageName();
                      for (ActivityManager.RunningAppProcessInfo p : procs) {
                          if (pkg.equals(p.processName)
                              && p.importance == ActivityManager.RunningAppProcessInfo.IMPORTANCE_FOREGROUND) {
                              return true;
                          }
                      }
                  } catch (Exception ignored) {}
                  return false;
              }
              private static String getOrDef(Map<String,String> m, String k, String d) {
                  String v = m.get(k); return (v != null && !v.isEmpty()) ? v : d;
              }
          }
          EOF
          echo "✅ MensaenaCallService.java created"

      - name: Create IncomingCallService.java – FullScreenIntent foreground service
        run: |
          SERVICE="android/app/src/main/java/de/mensaena/app/IncomingCallService.java"
          mkdir -p "$(dirname "$SERVICE")"
          cat > "$SERVICE" <<'EOF'
          package de.mensaena.app;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.ServiceInfo;
          import android.media.AudioAttributes;
          import android.media.AudioManager;
          import android.media.Ringtone;
          import android.media.RingtoneManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.IBinder;
          import android.os.VibrationEffect;
          import android.os.Vibrator;
          import androidx.core.app.NotificationCompat;
          import androidx.core.app.Person;
          public class IncomingCallService extends Service {
              // WICHTIG: Channel-ID gebumped weil Channels auf Android 8+ nach Erstellung
              // immutable sind. Bei Bestandsinstallationen war der Channel ohne Ringtone
              // konfiguriert -> setSound() ohne Wirkung. Neue ID erzwingt frische Channel-Config.
              static final String CALL_CHANNEL_ID = "mensaena_calls_v2";
              static final int    NOTIFICATION_ID  = 9001;
              private Ringtone ringtone;
              private Vibrator vibrator;
              private android.os.PowerManager.WakeLock wakeLock;
              @Override
              public void onCreate() {
                  super.onCreate();
                  // WhatsApp-Pattern: Partial-WakeLock damit CPU wach bleibt während
                  // Ringtone+Vibration laufen, auch wenn Display aus geht.
                  try {
                      android.os.PowerManager pm = (android.os.PowerManager) getSystemService(Context.POWER_SERVICE);
                      if (pm != null) {
                          wakeLock = pm.newWakeLock(android.os.PowerManager.PARTIAL_WAKE_LOCK, "Mensaena:CallService");
                          wakeLock.setReferenceCounted(false);
                          wakeLock.acquire(60000L);
                      }
                  } catch (Exception ignored) {}
              }
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent == null) { stopSelf(); return START_NOT_STICKY; }
                  String callerName = intent.getStringExtra("caller_name");
                  if (callerName == null || callerName.isEmpty()) callerName = "Anrufer";
                  String callType = intent.getStringExtra("call_type");
                  if (callType == null) callType = "audio";
                  String callId = intent.getStringExtra("call_id");
                  if (callId == null) callId = "0";
                  String convId = intent.getStringExtra("conv_id");
                  if (convId == null) convId = "";
                  String callBody = "video".equals(callType) ? "Eingehender Videoanruf" : "Eingehender Sprachanruf";
                  // Alten Channel löschen falls noch vorhanden (Migration von v1 -> v2)
                  cleanupLegacyChannel();
                  ensureCallChannel();
                  String callerAvatar = intent.getStringExtra("caller_avatar");
                  if (callerAvatar == null) callerAvatar = "";
                  String roomName = intent.getStringExtra("room_name");
                  if (roomName == null) roomName = "";

                  int pf = PendingIntent.FLAG_UPDATE_CURRENT
                      | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0);
                  // FullScreenIntent + Tap → native IncomingCallActivity (WhatsApp-Pattern).
                  // Vorteil: rendert SOFORT (kein WebView-Cold-Start). Erst bei "Annehmen"
                  // wird MainActivity (Capacitor WebView) gestartet.
                  Intent fsI = new Intent(this, IncomingCallActivity.class);
                  fsI.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                  fsI.putExtra("call_id", callId);
                  fsI.putExtra("conv_id", convId);
                  fsI.putExtra("room_name", roomName);
                  fsI.putExtra("caller_name", callerName);
                  fsI.putExtra("caller_avatar", callerAvatar);
                  fsI.putExtra("call_type", callType);
                  PendingIntent fsPi = PendingIntent.getActivity(this, callId.hashCode(), fsI, pf);
                  // Direkter Accept-PendingIntent (Notification-Action-Button) → öffnet
                  // direkt MainActivity mit Deep-Link, überspringt IncomingCallActivity.
                  Intent accI = new Intent(this, MainActivity.class);
                  accI.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                  accI.putExtra("incoming_call", true);
                  accI.putExtra("call_action", "accept");
                  accI.putExtra("call_id", callId);
                  accI.putExtra("conv_id", convId);
                  accI.putExtra("room_name", roomName);
                  accI.setData(Uri.parse("https://www.mensaena.de/dashboard/chat?conv=" + convId + "&call=" + callId + "&action=accept&type=" + callType));
                  PendingIntent accPi = PendingIntent.getActivity(this, callId.hashCode() + 1, accI, pf);
                  Intent decI = new Intent(this, CallDeclineReceiver.class);
                  decI.setAction("de.mensaena.DECLINE_CALL");
                  decI.putExtra("call_id", callId);
                  decI.putExtra("notification_id", NOTIFICATION_ID);
                  PendingIntent decPi = PendingIntent.getBroadcast(this, callId.hashCode() + 2, decI, pf);
                  // Annehmen/Ablehnen-Buttons IMMER hinzufügen (Heads-up-Popup
                  // sowie Lock-Screen-Notification). Auf SDK 31+ ergänzt CallStyle
                  // zusätzlich die großen runden Buttons. Doppel-Actions stört nicht.
                  NotificationCompat.Action acceptAction = new NotificationCompat.Action.Builder(
                      android.R.drawable.ic_menu_call, "Annehmen", accPi).build();
                  NotificationCompat.Action declineAction = new NotificationCompat.Action.Builder(
                      android.R.drawable.ic_menu_close_clear_cancel, "Ablehnen", decPi).build();
                  NotificationCompat.Builder b = new NotificationCompat.Builder(this, CALL_CHANNEL_ID)
                      .setSmallIcon(android.R.drawable.sym_call_incoming)
                      .setContentTitle(callerName).setContentText(callBody)
                      .setPriority(NotificationCompat.PRIORITY_MAX)
                      .setCategory(NotificationCompat.CATEGORY_CALL)
                      .setVisibility(NotificationCompat.VISIBILITY_PUBLIC)
                      .setOngoing(true).setFullScreenIntent(fsPi, true)
                      .setTimeoutAfter(45000L).setContentIntent(fsPi)
                      .addAction(acceptAction).addAction(declineAction);
                  if (Build.VERSION.SDK_INT >= 31) {
                      Person caller = new Person.Builder().setName(callerName).setImportant(true).build();
                      b.setStyle(NotificationCompat.CallStyle.forIncomingCall(caller, decPi, accPi));
                  }
                  Notification n = b.build();
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      startForeground(NOTIFICATION_ID, n, ServiceInfo.FOREGROUND_SERVICE_TYPE_PHONE_CALL);
                  } else {
                      startForeground(NOTIFICATION_ID, n);
                  }
                  // WhatsApp-Pattern: aktiver loopender Ringtone + dauerhafte Vibration
                  // Channel-Sound feuert nur EINMAL bei Notification-Post. Für echtes
                  // Anruf-Feeling muss der Service den Klingelton dauerhaft abspielen.
                  startRingtoneAndVibration();
                  // WhatsApp-Pattern: startActivity() direkt aufrufen damit der
                  // Call-Screen auch bei entsperrtem Gerät und App im Hintergrund
                  // erscheint. Mit MANAGE_OWN_CALLS Permission ist das auf Android
                  // 10+ erlaubt. fsI hat bereits incoming_call=true Extra gesetzt
                  // damit MainActivity.handleIncomingCallIntent() Lockscreen+Wakelock aktiviert.
                  try {
                      startActivity(fsI);
                  } catch (Exception e) {
                      // Manche Geräte/OEMs blocken Background-startActivity – FullScreenIntent
                      // sollte dann trotzdem feuern (zumindest auf Lock-Screen).
                  }
                  return START_NOT_STICKY;
              }
              @Override
              public void onDestroy() {
                  stopRingtoneAndVibration();
                  try { if (wakeLock != null && wakeLock.isHeld()) wakeLock.release(); } catch (Exception ignored) {}
                  wakeLock = null;
                  super.onDestroy();
              }
              @Override public IBinder onBind(Intent i) { return null; }
              private void startRingtoneAndVibration() {
                  // Ringtone abspielen (loopt automatisch via setLooping)
                  try {
                      Uri rt = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_RINGTONE);
                      ringtone = RingtoneManager.getRingtone(this, rt);
                      if (ringtone != null) {
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.P) {
                              ringtone.setLooping(true);
                              AudioAttributes aa = new AudioAttributes.Builder()
                                  .setUsage(AudioAttributes.USAGE_NOTIFICATION_RINGTONE)
                                  .setContentType(AudioAttributes.CONTENT_TYPE_SONIFICATION).build();
                              ringtone.setAudioAttributes(aa);
                          }
                          ringtone.play();
                      }
                  } catch (Exception ignored) {}
                  // Vibration loopen (Pattern: aus 1s, ein 1s, wiederholen)
                  try {
                      vibrator = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);
                      if (vibrator != null && vibrator.hasVibrator()) {
                          long[] pattern = {0, 1000, 1000};
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                              VibrationEffect effect = VibrationEffect.createWaveform(pattern, 0);
                              vibrator.vibrate(effect);
                          } else {
                              vibrator.vibrate(pattern, 0);
                          }
                      }
                  } catch (Exception ignored) {}
              }
              private void stopRingtoneAndVibration() {
                  try { if (ringtone != null && ringtone.isPlaying()) ringtone.stop(); } catch (Exception ignored) {}
                  ringtone = null;
                  try { if (vibrator != null) vibrator.cancel(); } catch (Exception ignored) {}
                  vibrator = null;
              }
              private void cleanupLegacyChannel() {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.O) return;
                  NotificationManager nm = getSystemService(NotificationManager.class);
                  if (nm == null) return;
                  // Alter Channel ohne Ringtone -> löschen damit User-Settings sauber sind
                  try { nm.deleteNotificationChannel("mensaena_calls"); } catch (Exception ignored) {}
              }
              private void ensureCallChannel() {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.O) return;
                  NotificationManager nm = getSystemService(NotificationManager.class);
                  if (nm == null || nm.getNotificationChannel(CALL_CHANNEL_ID) != null) return;
                  NotificationChannel ch = new NotificationChannel(CALL_CHANNEL_ID, "Anrufe", NotificationManager.IMPORTANCE_HIGH);
                  ch.setDescription("Eingehende Sprach- und Videoanrufe");
                  ch.setLockscreenVisibility(Notification.VISIBILITY_PUBLIC);
                  ch.enableLights(true); ch.setLightColor(0xFF1EAAA6);
                  // Vibration + Sound werden vom Service direkt geloopt -> Channel-Defaults aus
                  ch.enableVibration(false);
                  ch.setSound(null, null);
                  ch.setBypassDnd(true);
                  nm.createNotificationChannel(ch);
              }
          }
          EOF
          echo "✅ IncomingCallService.java created"

      # ── Native IncomingCallActivity Resources (XML, Drawables, Theme) ──
      # WhatsApp-Pattern: native Java-Activity rendert SOFORT mit Caller-Info +
      # Annehmen/Ablehnen-Buttons. Erst bei "Annehmen" wird die WebView gestartet
      # → Cold-Start-Verzögerung (3-5s React-Hydratisierung) wird komplett vermieden.
      - name: Create call drawable resources (gradient, buttons, avatar)
        run: |
          DRAWABLE_DIR="android/app/src/main/res/drawable"
          mkdir -p "$DRAWABLE_DIR"
          # Hintergrund-Gradient: Mensaena teal → dark teal
          cat > "$DRAWABLE_DIR/bg_call_gradient.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient
                  android:angle="135"
