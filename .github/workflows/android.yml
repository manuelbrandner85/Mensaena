name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug = sofort, release = mit Signing-Key)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Capacitor lädt die Live-Website (server.url), daher kein Next.js-Build nötig.
      # Nur Konfiguration + Icons werden synchronisiert.

      - name: Initialize Android project
        run: npx cap add android

      - name: Sync Capacitor config
        run: npx cap sync android

      - name: Generate Mensaena icons & splash
        run: |
          npx @capacitor/assets generate \
            --iconPath assets/icon-only.png \
            --splashPath assets/splash.png \
            --android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Rename APK output to mensaena-*.apk
        run: |
          python3 - <<'PYEOF'
          import re
          path = 'android/app/build.gradle'
          with open(path) as f:
              content = f.read()
          if 'mensaena' not in content:
              patch = (
                  "\n    applicationVariants.all { variant ->\n"
                  "        variant.outputs.all {\n"
                  "            outputFileName = \"mensaena-${variant.name}.apk\"\n"
                  "        }\n"
                  "    }\n"
              )
              content = re.sub(r'(^android\s*\{)', r'\1' + patch, content, count=1, flags=re.MULTILINE)
              with open(path, 'w') as f:
                  f.write(content)
              print('build.gradle patched – APK output renamed to mensaena-*.apk')
          else:
              print('build.gradle already patched')
          PYEOF

      # ── Debug Build (immer, kein Signing nötig) ──────────────────────────
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mensaena-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/mensaena-debug.apk
          retention-days: 30
          if-no-files-found: warn

      # ── Release Build (nur mit Signing Secrets oder manuellem Trigger) ───
      - name: Build Release APK
        if: >
          github.event.inputs.build_type == 'release' &&
          secrets.ANDROID_KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/mensaena.keystore
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=../app/mensaena.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: mensaena-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/mensaena-release.apk
          retention-days: 90
          if-no-files-found: warn
