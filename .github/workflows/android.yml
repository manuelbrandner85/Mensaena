name: Build APK & F-Droid Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein gleichzeitiger Pages-Deploy erlaubt
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: APK bauen ─────────────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Capacitor lädt die Live-Website (server.url) – kein Next.js-Build nötig.
      # public/index.html wird als Platzhalter erstellt, damit cap sync zufrieden ist.
      - name: Create webDir placeholder for cap sync
        run: |
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=https://www.mensaena.de"></head></html>' \
            > public/index.html

      - name: Initialize Android project
        run: npx cap add android

      - name: Sync Capacitor config
        run: npx cap sync android

      - name: Create icon-background for adaptive icons
        # assets/icon-foreground.png triggers adaptive-icon generation which
        # needs a matching icon-background.png, else the generated XML
        # references @mipmap/ic_launcher_background without the PNG ever being
        # written and Gradle fails at resource linking. Generate a 1024x1024
        # solid primary-teal background via sharp (already installed as a
        # transitive dep of @capacitor/assets).
        run: |
          node -e "require('sharp')({ create: { width: 1024, height: 1024, channels: 4, background: '#1EAAA6' } }).png().toFile('assets/icon-background.png').then(() => console.log('icon-background.png created'))"

      - name: Generate Mensaena icons & splash
        run: npx @capacitor/assets generate --android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build signed Release APK
        run: |
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android-signing/mensaena.jks \
            -Pandroid.injected.signing.store.password='mensaena2025!' \
            -Pandroid.injected.signing.key.alias=mensaena \
            -Pandroid.injected.signing.key.password='mensaena2025!'

      - name: Locate and copy Release APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found in release directory"
            find android/app/build -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          echo "Found APK: $APK"
          cp "$APK" mensaena-release.apk

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mensaena-release-${{ github.sha }}
          path: mensaena-release.apk
          retention-days: 90

      - name: Store APK for F-Droid job
        uses: actions/upload-artifact@v4
        with:
          name: apk-for-fdroid
          path: mensaena-release.apk
          retention-days: 1

  # ── Job 2: F-Droid Repo + GitHub Pages ───────────────────────────────────
  # continue-on-error: true → schlägt nur fehl wenn GitHub Pages nicht aktiviert ist
  publish-fdroid-pages:
    needs: build-apk
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk-for-fdroid
          path: .

      - name: Install fdroidserver
        run: pip install fdroidserver

      - name: Setup F-Droid repo structure
        run: |
          mkdir -p fdroid-build/repo
          # fdroid erwartet APKs als <appId>_<versionCode>.apk
          cp mensaena-release.apk "fdroid-build/repo/de.mensaena.app_${GITHUB_RUN_NUMBER}.apk"
          cp android-signing/mensaena.jks fdroid-build/
          cp -r fdroid/metadata fdroid-build/
          cp public/icons/icon-512x512.png fdroid-build/repo/icon.png

          python3 - <<'PYEOF'
          # fdroidserver 2.x renamed keyalias → repo_keyalias
          lines = [
              'repo_url: "https://manuelbrandner85.github.io/Mensaena/repo"',
              'repo_name: "Mensaena"',
              'repo_description: "Mensaena – Nachbarschaftshilfe App"',
              'repo_icon: "icon.png"',
              'keystore: "mensaena.jks"',
              'keystorepass: "mensaena2025!"',
              'repo_keyalias: "mensaena"',
              'keypass: "mensaena2025!"',
          ]
          with open('fdroid-build/config.yml', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print("config.yml written")
          PYEOF

      - name: Generate F-Droid index
        run: |
          cd fdroid-build
          fdroid update --create-metadata --verbose

      - name: Generate QR code for one-tap install
        run: |
          pip install qrcode[pil] --quiet
          python3 - <<'PYEOF'
          import qrcode
          url = (
            "fdroidrepos://manuelbrandner85.github.io/Mensaena/repo"
            "?fingerprint=C68487D0CF0F084959A01484326F04CEC541BB2E1B86D8171AA0F474356389F3"
          )
          img = qrcode.make(url)
          img.save("fdroid-build/repo/qr.png")
          print("QR code generated")
          PYEOF

      - name: Prepare Pages output (repo + landing page, ohne Keystore/Config)
        run: |
          mkdir -p pages-output/repo
          cp -r fdroid-build/repo/. pages-output/repo/
          cp fdroid/index.html pages-output/index.html
          # APK auch als mensaena-release.apk bereitstellen (Direktlink am Root)
          cp mensaena-release.apk pages-output/mensaena-release.apk

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
