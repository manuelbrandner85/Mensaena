name: Build APK & F-Droid Repo

on:
  push:
    branches:
      - main
    # Wenn die CI selbst public/fdroid/repo/ updated, triggert das KEIN zweites
    # Run (sonst Loop). Wir committen zusätzlich mit [skip ci] im Message als Gürtel+Hosenträger.
    paths-ignore:
      - 'public/fdroid/**'
  workflow_dispatch:

permissions:
  # contents: write – für GitHub Release + für Commit-Back in public/fdroid/repo
  contents: write

jobs:
  build-apk-and-fdroid:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Job-level env: Step-level env ist NICHT im if: des gleichen Steps verfügbar
    # (https://docs.github.com/en/actions/learn-github-actions/contexts#context-availability).
    # Deshalb hier auf Job-Level damit `if: env.GOOGLE_SERVICES_JSON != ''` korrekt evaluiert.
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Wir pushen am Ende zurück – braucht Token mit write + kein Shallow
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python (für fdroidserver)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Retry bei transient network issues (z.B. sharp/libvips binary download
        # timeouts via @capacitor/assets). Bis zu 3 Versuche mit 20s Pause.
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              echo "::notice::npm ci succeeded on attempt $attempt"
              exit 0
            fi
            echo "::warning::npm ci failed (attempt $attempt/3) – retrying in 20s"
            rm -rf node_modules
            sleep 20
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1

      # ── Capacitor & APK Build ────────────────────────────────────────────
      # Capacitor lädt die Live-Website (server.url) – kein Next.js-Build nötig.
      # public/index.html wird als Platzhalter erstellt, damit cap sync zufrieden ist.
      - name: Create webDir placeholder for cap sync
        run: |
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=https://www.mensaena.de"></head></html>' \
            > public/index.html

      - name: Initialize Android project
        run: npx cap add android

      - name: Sync Capacitor config
        run: npx cap sync android

      - name: Patch AndroidManifest – WebRTC permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'android.permission.CAMERA' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n</manifest>|' "$MANIFEST"
            echo "✅ Camera permission added"
          fi
          if ! grep -q 'android.permission.RECORD_AUDIO' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n</manifest>|' "$MANIFEST"
            echo "✅ RECORD_AUDIO permission added"
          fi
          if ! grep -q 'android.permission.MODIFY_AUDIO_SETTINGS' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n</manifest>|' "$MANIFEST"
            echo "✅ MODIFY_AUDIO_SETTINGS permission added"
          fi
          # ── Phase 2: Full-Screen Incoming Calls (WhatsApp-style) ──
          if ! grep -q 'android.permission.USE_FULL_SCREEN_INTENT' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />\n</manifest>|' "$MANIFEST"
            echo "✅ USE_FULL_SCREEN_INTENT permission added"
          fi
          if ! grep -q 'android.permission.WAKE_LOCK' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.WAKE_LOCK" />\n</manifest>|' "$MANIFEST"
            echo "✅ WAKE_LOCK permission added"
          fi
          if ! grep -q 'android.permission.VIBRATE' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.VIBRATE" />\n</manifest>|' "$MANIFEST"
            echo "✅ VIBRATE permission added"
          fi
          if ! grep -q 'android.permission.FOREGROUND_SERVICE' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n</manifest>|' "$MANIFEST"
            echo "✅ FOREGROUND_SERVICE permission added"
          fi
          if ! grep -q 'FOREGROUND_SERVICE_PHONE_CALL' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_PHONE_CALL" />\n</manifest>|' "$MANIFEST"
            echo "✅ FOREGROUND_SERVICE_PHONE_CALL permission added"
          fi
          if ! grep -q 'android.permission.MANAGE_OWN_CALLS' "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.MANAGE_OWN_CALLS" />\n</manifest>|' "$MANIFEST"
            echo "✅ MANAGE_OWN_CALLS permission added"
          fi
          # MainActivity launchMode = singleTop + showWhenLocked attributes
          if ! grep -q 'android:showWhenLocked' "$MANIFEST"; then
            sed -i 's|<activity|<activity\n            android:showWhenLocked="true"\n            android:turnScreenOn="true"|' "$MANIFEST"
            echo "✅ showWhenLocked + turnScreenOn added to MainActivity"
          fi
          # Register MensaenaCallService + IncomingCallService
          if ! grep -q 'MensaenaCallService' "$MANIFEST"; then
            # Add tools namespace if missing
            sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |' "$MANIFEST"
            # Disable @capacitor's MessagingService, register ours + the foreground service
            sed -i 's|</application>|        <service android:name="com.capacitorjs.plugins.pushnotifications.MessagingService" tools:node="remove" />\n        <service android:name="de.mensaena.app.MensaenaCallService" android:exported="false">\n            <intent-filter android:priority="1">\n                <action android:name="com.google.firebase.MESSAGING_EVENT" />\n            </intent-filter>\n        </service>\n        <service android:name="de.mensaena.app.IncomingCallService" android:foregroundServiceType="phoneCall" android:exported="false" />\n        <receiver android:name="de.mensaena.app.CallDeclineReceiver" android:exported="false">\n            <intent-filter>\n                <action android:name="de.mensaena.DECLINE_CALL" />\n            </intent-filter>\n        </receiver>\n    </application>|' "$MANIFEST"
            echo "✅ MensaenaCallService + IncomingCallService + CallDeclineReceiver registered"
          fi

      - name: Patch app/build.gradle – add firebase-messaging dependency
        run: |
          GRADLE="android/app/build.gradle"
          if ! grep -q 'firebase-messaging' "$GRADLE"; then
            # Insert dependency in the dependencies block (after the opening brace)
            sed -i '/^dependencies {/a\    implementation "com.google.firebase:firebase-messaging:23.4.1"' "$GRADLE"
            echo "✅ firebase-messaging dependency added to app/build.gradle"
            grep -A1 'firebase-messaging' "$GRADLE"
          fi

      # ── Phase 2: Custom FCM Service + Foreground Service für Incoming Calls ──
      # NOTE: Java content MUST be indented by 10 spaces so YAML block scalar
      # stays valid. GitHub Actions strips those 10 spaces before passing to
      # bash, so the shell sees column-0 Java and a column-0 EOF terminator.
      - name: Create MensaenaCallService.java – starts IncomingCallService on data-only FCM
        run: |
          SERVICE="android/app/src/main/java/de/mensaena/app/MensaenaCallService.java"
          mkdir -p "$(dirname "$SERVICE")"
          cat > "$SERVICE" <<'EOF'
          package de.mensaena.app;
          import android.content.Intent;
          import android.os.Build;
          import com.capacitorjs.plugins.pushnotifications.MessagingService;
          import com.google.firebase.messaging.RemoteMessage;
          import java.util.Map;
          public class MensaenaCallService extends MessagingService {
              @Override
              public void onMessageReceived(RemoteMessage remoteMessage) {
                  Map<String, String> data = remoteMessage.getData();
                  String type = data != null ? data.get("type") : null;
                  if ("incoming_call".equals(type)) {
                      Intent si = new Intent(this, IncomingCallService.class);
                      si.putExtra("caller_name", getOrDef(data, "caller_name", "Anrufer"));
                      si.putExtra("call_type",   getOrDef(data, "call_type",   "audio"));
                      si.putExtra("call_id",     getOrDef(data, "call_id",     "0"));
                      si.putExtra("conv_id",     getOrDef(data, "conversation_id", ""));
                      si.putExtra("room_name",   getOrDef(data, "room_name",   ""));
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          startForegroundService(si);
                      } else {
                          startService(si);
                      }
                      return;
                  }
                  super.onMessageReceived(remoteMessage);
              }
              private static String getOrDef(Map<String,String> m, String k, String d) {
                  String v = m.get(k); return (v != null && !v.isEmpty()) ? v : d;
              }
          }
          EOF
          echo "✅ MensaenaCallService.java created"

      - name: Create IncomingCallService.java – FullScreenIntent foreground service
        run: |
          SERVICE="android/app/src/main/java/de/mensaena/app/IncomingCallService.java"
          mkdir -p "$(dirname "$SERVICE")"
          cat > "$SERVICE" <<'EOF'
          package de.mensaena.app;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.content.pm.ServiceInfo;
          import android.media.AudioAttributes;
          import android.net.Uri;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;
          import androidx.core.app.Person;
          public class IncomingCallService extends Service {
              static final String CALL_CHANNEL_ID = "mensaena_calls";
              static final int    NOTIFICATION_ID  = 9001;
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent == null) { stopSelf(); return START_NOT_STICKY; }
                  String callerName = intent.getStringExtra("caller_name");
                  if (callerName == null || callerName.isEmpty()) callerName = "Anrufer";
                  String callType = intent.getStringExtra("call_type");
                  if (callType == null) callType = "audio";
                  String callId = intent.getStringExtra("call_id");
                  if (callId == null) callId = "0";
                  String convId = intent.getStringExtra("conv_id");
                  if (convId == null) convId = "";
                  String callBody = "video".equals(callType) ? "Eingehender Videoanruf" : "Eingehender Sprachanruf";
                  ensureCallChannel();
                  int pf = PendingIntent.FLAG_UPDATE_CURRENT
                      | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0);
                  Intent fsI = new Intent(this, MainActivity.class);
                  fsI.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                  fsI.putExtra("incoming_call", true);
                  fsI.putExtra("call_id", callId);
                  fsI.putExtra("conv_id", convId);
                  fsI.setData(Uri.parse("https://www.mensaena.de/dashboard/chat?conv=" + convId + "&call=" + callId));
                  PendingIntent fsPi = PendingIntent.getActivity(this, callId.hashCode(), fsI, pf);
                  Intent accI = new Intent(this, MainActivity.class);
                  accI.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                  accI.setData(Uri.parse("https://www.mensaena.de/dashboard/chat?conv=" + convId + "&call=" + callId + "&action=accept"));
                  PendingIntent accPi = PendingIntent.getActivity(this, callId.hashCode() + 1, accI, pf);
                  Intent decI = new Intent(this, CallDeclineReceiver.class);
                  decI.setAction("de.mensaena.DECLINE_CALL");
                  decI.putExtra("call_id", callId);
                  decI.putExtra("notification_id", NOTIFICATION_ID);
                  PendingIntent decPi = PendingIntent.getBroadcast(this, callId.hashCode() + 2, decI, pf);
                  NotificationCompat.Builder b;
                  if (Build.VERSION.SDK_INT >= 31) {
                      Person caller = new Person.Builder().setName(callerName).setImportant(true).build();
                      b = new NotificationCompat.Builder(this, CALL_CHANNEL_ID)
                          .setSmallIcon(android.R.drawable.sym_call_incoming)
                          .setStyle(NotificationCompat.CallStyle.forIncomingCall(caller, decPi, accPi))
                          .setFullScreenIntent(fsPi, true)
                          .setCategory(NotificationCompat.CATEGORY_CALL)
                          .setVisibility(NotificationCompat.VISIBILITY_PUBLIC)
                          .setOngoing(true).setTimeoutAfter(45000L).setContentIntent(fsPi);
                  } else {
                      b = new NotificationCompat.Builder(this, CALL_CHANNEL_ID)
                          .setSmallIcon(android.R.drawable.sym_call_incoming)
                          .setContentTitle(callerName).setContentText(callBody)
                          .setPriority(NotificationCompat.PRIORITY_MAX)
                          .setCategory(NotificationCompat.CATEGORY_CALL)
                          .setVisibility(NotificationCompat.VISIBILITY_PUBLIC)
                          .setOngoing(true).setFullScreenIntent(fsPi, true)
                          .setTimeoutAfter(45000L).setContentIntent(fsPi)
                          .addAction(android.R.drawable.ic_menu_call, "Annehmen", accPi)
                          .addAction(android.R.drawable.ic_menu_close_clear_cancel, "Ablehnen", decPi);
                  }
                  Notification n = b.build();
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      startForeground(NOTIFICATION_ID, n, ServiceInfo.FOREGROUND_SERVICE_TYPE_PHONE_CALL);
                  } else {
                      startForeground(NOTIFICATION_ID, n);
                  }
                  // WhatsApp-Pattern: startActivity() direkt aufrufen damit der
                  // Call-Screen auch bei entsperrtem Gerät und App im Hintergrund
                  // erscheint. Mit MANAGE_OWN_CALLS Permission ist das auf Android
                  // 10+ erlaubt. fsI hat bereits incoming_call=true Extra gesetzt
                  // damit MainActivity.handleIncomingCallIntent() Lockscreen+Wakelock aktiviert.
                  try {
                      startActivity(fsI);
                  } catch (Exception e) {
                      // Manche Geräte/OEMs blocken Background-startActivity – FullScreenIntent
                      // sollte dann trotzdem feuern (zumindest auf Lock-Screen).
                  }
                  return START_NOT_STICKY;
              }
              @Override public IBinder onBind(Intent i) { return null; }
              private void ensureCallChannel() {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.O) return;
                  NotificationManager nm = getSystemService(NotificationManager.class);
                  if (nm == null || nm.getNotificationChannel(CALL_CHANNEL_ID) != null) return;
                  NotificationChannel ch = new NotificationChannel(CALL_CHANNEL_ID, "Anrufe", NotificationManager.IMPORTANCE_HIGH);
                  ch.setDescription("Eingehende Sprach- und Videoanrufe");
                  ch.setLockscreenVisibility(Notification.VISIBILITY_PUBLIC);
                  ch.enableLights(true); ch.setLightColor(0xFF1EAAA6);
                  ch.enableVibration(true);
                  ch.setVibrationPattern(new long[]{0, 400, 200, 400, 200, 400});
                  Uri rt = android.media.RingtoneManager.getDefaultUri(android.media.RingtoneManager.TYPE_RINGTONE);
                  AudioAttributes aa = new AudioAttributes.Builder()
                      .setUsage(AudioAttributes.USAGE_NOTIFICATION_RINGTONE)
                      .setContentType(AudioAttributes.CONTENT_TYPE_SONIFICATION).build();
                  ch.setSound(rt, aa);
                  nm.createNotificationChannel(ch);
              }
          }
          EOF
          echo "✅ IncomingCallService.java created"

      - name: Create CallDeclineReceiver.java – decline without opening app
        run: |
          SERVICE="android/app/src/main/java/de/mensaena/app/CallDeclineReceiver.java"
          mkdir -p "$(dirname "$SERVICE")"
          cat > "$SERVICE" <<'EOF'
          package de.mensaena.app;
          import android.app.NotificationManager;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          public class CallDeclineReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  int nid = intent.getIntExtra("notification_id", IncomingCallService.NOTIFICATION_ID);
                  NotificationManager nm = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (nm != null) nm.cancel(nid);
                  context.stopService(new Intent(context, IncomingCallService.class));
              }
          }
          EOF
          echo "✅ CallDeclineReceiver.java created"

      # ── KRITISCH: MainActivity patchen für WebRTC im WebView ──────────────
      # Capacitor's default MainActivity überschreibt onPermissionRequest NICHT.
      # Resultat: getUserMedia() in JS wirft "Permission denied" auch wenn
      # Manifest-Permissions vorhanden sind, weil der WebView die Anfrage stillschweigend
      # ablehnt. Außerdem müssen Runtime-Permissions (Android 6+) explizit beim
      # App-Start angefragt werden.
      - name: Patch MainActivity.java – WebView WebRTC + Incoming-Call FullScreen
        run: |
          MAIN="android/app/src/main/java/de/mensaena/app/MainActivity.java"
          mkdir -p "$(dirname "$MAIN")"
          cat > "$MAIN" <<'EOF'
          package de.mensaena.app;

          import android.Manifest;
          import android.app.KeyguardManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.PowerManager;
          import android.view.WindowManager;
          import android.webkit.PermissionRequest;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import com.getcapacitor.BridgeActivity;
          import com.getcapacitor.BridgeWebChromeClient;

          public class MainActivity extends BridgeActivity {
              private static final int PERMISSION_REQUEST_CODE = 9991;
              private static final String[] WEBRTC_PERMISSIONS = {
                  Manifest.permission.CAMERA,
                  Manifest.permission.RECORD_AUDIO,
                  Manifest.permission.MODIFY_AUDIO_SETTINGS,
              };

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // ── Wenn von Incoming-Call gestartet → Bildschirm wecken + über Lockscreen ──
                  handleIncomingCallIntent(getIntent());

                  // Runtime-Permissions anfragen wenn nicht erteilt (Android 6+)
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      boolean needsRequest = false;
                      for (String perm : WEBRTC_PERMISSIONS) {
                          if (ContextCompat.checkSelfPermission(this, perm) != PackageManager.PERMISSION_GRANTED) {
                              needsRequest = true;
                              break;
                          }
                      }
                      if (needsRequest) {
                          ActivityCompat.requestPermissions(this, WEBRTC_PERMISSIONS, PERMISSION_REQUEST_CODE);
                      }
                  }

                  // WebChromeClient überschreiben damit WebView getUserMedia()-Aufrufe erlaubt
                  bridge.getWebView().setWebChromeClient(new BridgeWebChromeClient(bridge) {
                      @Override
                      public void onPermissionRequest(final PermissionRequest request) {
                          runOnUiThread(() -> request.grant(request.getResources()));
                      }
                  });
              }

              @Override
              protected void onNewIntent(Intent intent) {
                  super.onNewIntent(intent);
                  setIntent(intent);
                  handleIncomingCallIntent(intent);
              }

              private void handleIncomingCallIntent(Intent intent) {
                  if (intent == null) return;
                  boolean isCall = intent.getBooleanExtra("incoming_call", false);
                  if (!isCall) return;

                  // Bildschirm anschalten + über Lockscreen anzeigen
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O_MR1) {
                      setShowWhenLocked(true);
                      setTurnScreenOn(true);
                      KeyguardManager km = (KeyguardManager) getSystemService(Context.KEYGUARD_SERVICE);
                      if (km != null) km.requestDismissKeyguard(this, null);
                  } else {
                      // Legacy API für Android < 8.1
                      getWindow().addFlags(
                          WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED
                          | WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON
                          | WindowManager.LayoutParams.FLAG_DISMISS_KEYGUARD
                          | WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON
                      );
                  }

                  // Bildschirm wecken
                  PowerManager pm = (PowerManager) getSystemService(Context.POWER_SERVICE);
                  if (pm != null) {
                      PowerManager.WakeLock wl = pm.newWakeLock(
                          PowerManager.SCREEN_BRIGHT_WAKE_LOCK
                          | PowerManager.ACQUIRE_CAUSES_WAKEUP
                          | PowerManager.ON_AFTER_RELEASE,
                          "Mensaena:IncomingCall");
                      wl.acquire(60000L);
                      wl.release();
                  }
              }
          }
          EOF
          echo "✅ MainActivity.java patched für WebRTC + Incoming Call"
          cat "$MAIN"

      # ── FCM / Firebase google-services.json ─────────────────────────────
      # GitHub Secret GOOGLE_SERVICES_JSON enthält das komplette JSON aus
      # dem Firebase-Console-Download ("Android-App hinzufügen"). Ohne das
      # Secret schlägt der Release-Build FEHL, weil das google-services
      # Gradle-Plugin die Datei erwartet sobald das push-notifications
      # Capacitor-Plugin synced wurde.
      #
      # Wenn FCM später entfernt werden soll: Secret leer setzen und zusätzlich
      # das apply plugin "com.google.gms.google-services" in der Gradle-Config
      # deaktivieren.
      - name: Restore google-services.json from secret
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error title=GOOGLE_SERVICES_JSON secret fehlt::Das @capacitor/push-notifications Plugin braucht google-services.json aus Firebase. Trag den Inhalt der vom Firebase-Console heruntergeladenen JSON-Datei 1:1 als GitHub-Secret GOOGLE_SERVICES_JSON ein (Repo → Settings → Secrets and variables → Actions)."
            exit 1
          fi
          mkdir -p android/app
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" \
            && echo "google-services.json OK"

      - name: Create icon-background for adaptive icons
        run: |
          sudo apt-get install -y --no-install-recommends imagemagick
          convert -size 1024x1024 xc:"#1EAAA6" assets/icon-background.png
          echo "icon-background.png created"
          cp assets/icon-only.png assets/icon.png

      - name: Generate Mensaena icons & splash
        run: npx @capacitor/assets generate --android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # ── Restore signing keystore from secret ─────────────────────────────
      # Keystore wird als base64-encodierte Datei im GitHub-Secret
      # ANDROID_KEYSTORE_BASE64 gespeichert. Lokal generieren mit:
      #   base64 -w0 mensaena.jks > mensaena.jks.b64
      # Inhalt 1:1 als Secret hinterlegen.
      - name: Validate Android signing secrets
        env:
          KS_B64:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for var in KS_B64 KS_PASS KEY_ALIAS KEY_PASS; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::ANDROID_${var#KS_} fehlt – siehe Workflow-Kommentar zum Anlegen"
              missing=1
            fi
          done
          exit $missing

      - name: Restore keystore from secret
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          python3 -c "import os,base64,re,sys; raw=os.environ['KS_B64']; clean=re.sub(r'[^A-Za-z0-9+/=]','',raw).rstrip('='); d=base64.b64decode(clean+'='*(-len(clean)%4)); open(os.path.join(os.environ['RUNNER_TEMP'],'signing','mensaena.jks'),'wb').write(d); valid = d[:4]==b'\xfe\xed\xfe\xed' or d[:2]==b'\x30\x82'; print('Keystore:',len(d),'bytes magic=',d[:8].hex(),'valid=',valid); sys.exit('Invalid keystore – ANDROID_KEYSTORE_BASE64 secret ist korrupt. Neu generieren: base64 -w0 mensaena.jks | pbcopy (macOS) oder base64 -w0 mensaena.jks (Linux), Output 1:1 in das Secret kopieren') if not valid else None"

      - name: Build signed Release APK
        run: |
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/signing/mensaena.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Locate and copy Release APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found in release directory"
            find android/app/build -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          echo "Found APK: $APK"
          cp "$APK" mensaena-release.apk

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mensaena-release-${{ github.sha }}
          path: mensaena-release.apk
          retention-days: 90

      # ── GitHub Release: stable public download URL ─────────────────────
      # URL: https://github.com/<owner>/<repo>/releases/latest/download/mensaena-release.apk
      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Mensaena (latest build)
          body: |
            Mensaena Android APK – automatisch gebaut aus `main`.

            **Direct download:** [`mensaena-release.apk`](https://github.com/${{ github.repository }}/releases/latest/download/mensaena-release.apk)

            * Build SHA: `${{ github.sha }}`
            * Build Datum: `${{ github.event.head_commit.timestamp }}`
            * Run: ${{ github.run_number }}
          files: mensaena-release.apk
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── F-Droid Repo generieren ──────────────────────────────────────────
      - name: Install fdroidserver
        run: pip install fdroidserver

      - name: Setup F-Droid repo structure
        env:
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p fdroid-build/repo
          # fdroid erwartet APKs als <appId>_<versionCode>.apk
          cp mensaena-release.apk "fdroid-build/repo/de.mensaena.app_${GITHUB_RUN_NUMBER}.apk"
          cp "$RUNNER_TEMP/signing/mensaena.jks" fdroid-build/
          cp -r fdroid/metadata fdroid-build/
          cp public/icons/icon-512x512.png fdroid-build/repo/icon.png

          # config.yml mit Werten aus Secrets schreiben (kein Hardcoding!)
          KS_PASS="$KS_PASS" KEY_ALIAS="$KEY_ALIAS" KEY_PASS="$KEY_PASS" python3 - <<'PYEOF'
          import os, json
          # repo_url zeigt jetzt auf www.mensaena.de/fdroid/repo.
          # Index-Dateien landen in public/fdroid/repo/ und werden von Cloudflare
          # als statische Next.js-Assets ausgeliefert. APK-URLs werden per
          # next.config.js redirect auf die stabile GitHub-Release-URL umgeleitet.
          lines = [
              'repo_url: "https://www.mensaena.de/fdroid/repo"',
              'repo_name: "Mensaena"',
              'repo_description: "Mensaena – Nachbarschaftshilfe App"',
              'repo_icon: "icon.png"',
              'keystore: "mensaena.jks"',
              f'keystorepass: {json.dumps(os.environ["KS_PASS"])}',
              f'repo_keyalias: {json.dumps(os.environ["KEY_ALIAS"])}',
              f'keypass: {json.dumps(os.environ["KEY_PASS"])}',
          ]
          with open('fdroid-build/config.yml', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print("config.yml written")
          PYEOF

      - name: Generate F-Droid index
        run: |
          cd fdroid-build
          fdroid update --create-metadata --verbose

      # ── Index-Dateien nach public/fdroid/repo/ kopieren ─────────────────
      # Wir committen NUR die kleinen Index-Dateien (index-v1.jar, entry.json,
      # config.json, icons/). APKs bleiben in GitHub Releases und werden
      # via next.config.js-Redirect ausgeliefert – das hält das Git-Repo klein.
      - name: Sync index files to public/fdroid/repo/
        run: |
          rm -rf public/fdroid/repo
          mkdir -p public/fdroid/repo

          # Kleine Index- und Config-Dateien (die F-Droid-App braucht)
          for f in index-v1.jar index-v2.json entry.json config.json diff/*.json; do
            if ls fdroid-build/repo/$f 2>/dev/null; then
              cp --parents fdroid-build/repo/$f public/fdroid/repo/ 2>/dev/null || \
                cp fdroid-build/repo/$f public/fdroid/repo/
            fi
          done

          # Re-structure: move files up to public/fdroid/repo/ root
          # (cp --parents puts them in fdroid-build/repo/... nested structure)
          if [ -d public/fdroid/repo/fdroid-build ]; then
            cp -r public/fdroid/repo/fdroid-build/repo/. public/fdroid/repo/
            rm -rf public/fdroid/repo/fdroid-build
          fi

          # Icons-Ordner falls generiert
          if [ -d fdroid-build/repo/icons ]; then
            cp -r fdroid-build/repo/icons public/fdroid/repo/
          fi

          # App-Icon (wird von F-Droid-Client gezeigt)
          [ -f fdroid-build/repo/icon.png ] && cp fdroid-build/repo/icon.png public/fdroid/repo/

          # Optional: README im Ordner damit klar ist was hier passiert
          cat > public/fdroid/repo/README.md <<'EOF'
          # F-Droid Repository Index

          **Diese Dateien werden von der CI (`.github/workflows/android.yml`) generiert.
          Nicht von Hand bearbeiten!**

          - Der Index (`index-v1.jar`, `entry.json`, etc.) wird von der F-Droid-App
            gelesen, wenn das Repo `https://www.mensaena.de/fdroid/repo` hinzugefügt wird.
          - APK-Downloads (`de.mensaena.app_*.apk`) werden per Next.js-Redirect
            auf die entsprechende GitHub-Release-URL umgeleitet
            (`releases/latest/download/mensaena-release.apk`).

          Der Fingerprint des Signing-Keys muss in `src/lib/app-download.ts`
          (Konstante `FDROID_FINGERPRINT`) übereinstimmen.
          EOF

          echo "── Files that will be committed ──"
          ls -la public/fdroid/repo/ || true

      # ── Index zurück in main committen ──────────────────────────────────
      # paths-ignore auf public/fdroid/** verhindert, dass dieser Bot-Commit
      # den android.yml-Workflow erneut triggert. `[skip ci]` wird bewusst
      # NICHT verwendet – sonst würde auch der Cloudflare-Deploy (deploy.yml)
      # diesen Commit überspringen und die neuen Index-Dateien nie ausliefern.
      - name: Commit F-Droid index back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/fdroid/repo/
          if git diff --cached --quiet; then
            echo "No F-Droid index changes to commit."
          else
            git commit -m "ci(fdroid): update index

            Auto-generated by .github/workflows/android.yml run #${GITHUB_RUN_NUMBER}
            Build SHA: ${GITHUB_SHA}"
            git fetch origin main
            git rebase -X theirs origin/main
            git push origin HEAD:main
            echo "F-Droid index committed to main."
          fi
