name: Build APK & F-Droid Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein gleichzeitiger Pages-Deploy erlaubt
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Capacitor lädt die Live-Website (server.url) – kein Next.js-Build nötig.

      - name: Initialize Android project
        run: npx cap add android

      - name: Sync Capacitor config
        run: npx cap sync android

      - name: Generate Mensaena icons & splash
        run: |
          npx @capacitor/assets generate \
            --iconPath assets/icon-only.png \
            --splashPath assets/splash.png \
            --android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Rename APK output to mensaena-release.apk
        run: |
          python3 - <<'PYEOF'
          import re
          path = 'android/app/build.gradle'
          with open(path) as f:
              content = f.read()
          if 'mensaena' not in content:
              patch = (
                  "\n    applicationVariants.all { variant ->\n"
                  "        variant.outputs.all {\n"
                  "            outputFileName = \"mensaena-${variant.name}.apk\"\n"
                  "        }\n"
                  "    }\n"
              )
              content = re.sub(r'(^android\s*\{)', r'\1' + patch, content, count=1, flags=re.MULTILINE)
              with open(path, 'w') as f:
                  f.write(content)
          PYEOF

      - name: Build signed Release APK
        run: |
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android-signing/mensaena.jks \
            -Pandroid.injected.signing.store.password='mensaena2025!' \
            -Pandroid.injected.signing.key.alias=mensaena \
            -Pandroid.injected.signing.key.password='mensaena2025!'

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mensaena-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/mensaena-release.apk
          retention-days: 90

      # ── F-Droid Repo ─────────────────────────────────────────────────────

      - name: Install fdroidserver
        run: pip install fdroidserver

      - name: Setup F-Droid repo structure
        run: |
          mkdir -p fdroid-build/repo
          cp android/app/build/outputs/apk/release/mensaena-release.apk fdroid-build/repo/
          cp android-signing/mensaena.jks fdroid-build/
          cp -r fdroid/metadata fdroid-build/
          cp public/icons/icon-512x512.png fdroid-build/repo/icon.png

          cat > fdroid-build/config.yml << 'EOF'
          repo_url: "https://manuelbrandner85.github.io/Mensaena"
          repo_name: "Mensaena"
          repo_description: "Mensaena – Nachbarschaftshilfe App"
          repo_icon: "icon.png"
          keystore: "mensaena.jks"
          keystorepass: "mensaena2025!"
          keyalias: "mensaena"
          keypass: "mensaena2025!"
          EOF

      - name: Generate F-Droid index
        run: |
          cd fdroid-build
          fdroid update --create-metadata --verbose

      - name: Prepare Pages output (repo only, ohne Keystore/Config)
        run: |
          cp -r fdroid-build/repo pages-output

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
