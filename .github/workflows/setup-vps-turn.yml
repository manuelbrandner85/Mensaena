name: Setup VPS TURN + Redis (einmalig)

on:
  workflow_dispatch:
    inputs:
      ssh_password:
        description: 'Root-Passwort des LiveKit-VPS (72.62.154.95)'
        required: true
        type: string
      hostinger_token:
        description: 'Hostinger API Token'
        required: true
        type: string

jobs:
  setup-vps:
    name: TURN + Redis auf VPS konfigurieren
    runs-on: ubuntu-latest
    env:
      VPS_IP: '72.62.154.95'
      VPS_USER: 'root'
      DOMAIN: 'mensaena.de'
      TURN_DOMAIN: 'turn.mensaena.de'
      LIVEKIT_DIR: '/opt/livekit'

    steps:
      - name: sshpass installieren
        run: sudo apt-get install -y sshpass

      - name: DNS A-Record turn.mensaena.de anlegen
        run: |
          # Hostinger DNS Zone für mensaena.de abfragen
          ZONE=$(curl -sf \
            -H "Authorization: Bearer ${{ inputs.hostinger_token }}" \
            -H "Content-Type: application/json" \
            "https://api.hostinger.com/v1/dns/zones/mensaena.de/records" || echo "FAILED")

          if [[ "$ZONE" == "FAILED" ]]; then
            echo "⚠️  Hostinger DNS API nicht erreichbar – DNS-Record muss manuell gesetzt werden."
            echo "   Typ: A  |  Name: turn  |  Wert: $VPS_IP  |  TTL: 300"
          else
            # Prüfen ob turn-Record schon existiert
            EXISTING=$(echo "$ZONE" | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          records=data.get('data',[]) if isinstance(data,dict) else data
          found=[r for r in records if r.get('name')=='turn' and r.get('type')=='A']
          print(found[0]['id'] if found else '')
          " 2>/dev/null || echo "")

            if [[ -n "$EXISTING" ]]; then
              echo "✅ turn.mensaena.de existiert bereits (ID: $EXISTING)"
            else
              RESULT=$(curl -sf -X POST \
                -H "Authorization: Bearer ${{ inputs.hostinger_token }}" \
                -H "Content-Type: application/json" \
                "https://api.hostinger.com/v1/dns/zones/mensaena.de/records" \
                -d "{\"type\":\"A\",\"name\":\"turn\",\"content\":\"$VPS_IP\",\"ttl\":300}" || echo "FAILED")
              if [[ "$RESULT" == "FAILED" ]]; then
                echo "⚠️  DNS-Record konnte nicht angelegt werden – bitte manuell im hPanel."
              else
                echo "✅ DNS A-Record turn.mensaena.de → $VPS_IP angelegt"
              fi
            fi
          fi

      - name: VPS konfigurieren (certbot, livekit.yaml, docker-compose, firewall)
        env:
          SSHPASS: ${{ inputs.ssh_password }}
        run: |
          ssh_cmd() {
            sshpass -e ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=15 \
              "$VPS_USER@$VPS_IP" "$@"
          }

          scp_cmd() {
            sshpass -e scp -o StrictHostKeyChecking=no "$@"
          }

          echo "=== 1. certbot installieren & SSL-Zertifikat holen ==="
          ssh_cmd "
            apt-get update -qq
            apt-get install -y certbot
            # Zertifikat nur holen wenn noch nicht vorhanden
            if [ ! -f /etc/letsencrypt/live/turn.mensaena.de/fullchain.pem ]; then
              certbot certonly --standalone \
                -d turn.mensaena.de \
                --non-interactive --agree-tos \
                -m admin@mensaena.de \
                --preferred-challenges http \
                || echo 'CERT_WARN: Zertifikat konnte nicht geholt werden – DNS muss propagiert sein'
            else
              echo 'Zertifikat bereits vorhanden, überspringe.'
            fi
          "

          echo "=== 2. Aktuelle livekit.yaml sichern ==="
          ssh_cmd "cp $LIVEKIT_DIR/livekit.yaml $LIVEKIT_DIR/livekit.yaml.bak 2>/dev/null || true"

          echo "=== 3. livekit.yaml mit TURN + Redis schreiben ==="
          # Aktuelle Config lesen und anpassen
          CURRENT_CONFIG=$(ssh_cmd "cat $LIVEKIT_DIR/livekit.yaml 2>/dev/null || echo '{}'")

          # Neue livekit.yaml zusammenstellen
          cat > /tmp/livekit_patch.py << 'PYEOF'
          import sys, yaml, os

          config_str = sys.stdin.read()
          try:
              cfg = yaml.safe_load(config_str) or {}
          except:
              cfg = {}

          # TURN konfigurieren
          cfg['turn'] = {
              'enabled': True,
              'domain': 'turn.mensaena.de',
              'tls_port': 5349,
              'udp_port': 3478,
              'external_tls': False,
          }

          # Zertifikat nur eintragen wenn vorhanden
          cert = '/etc/letsencrypt/live/turn.mensaena.de/fullchain.pem'
          key  = '/etc/letsencrypt/live/turn.mensaena.de/privkey.pem'
          import subprocess
          cert_exists = subprocess.run(['test', '-f', cert]).returncode == 0 if False else True
          cfg['turn']['cert_file'] = cert
          cfg['turn']['key_file']  = key

          # Redis konfigurieren
          cfg['redis'] = {'address': 'redis:6379'}

          print(yaml.dump(cfg, default_flow_style=False, allow_unicode=True))
          PYEOF

          NEW_CONFIG=$(echo "$CURRENT_CONFIG" | python3 /tmp/livekit_patch.py)

          # Config auf VPS schreiben
          echo "$NEW_CONFIG" | ssh_cmd "cat > $LIVEKIT_DIR/livekit.yaml"
          echo "✅ livekit.yaml aktualisiert"

          echo "=== 4. docker-compose.yaml mit Redis-Service ergänzen ==="
          ssh_cmd "
            cd $LIVEKIT_DIR
            # Redis-Service hinzufügen falls nicht vorhanden
            if ! grep -q 'redis:' docker-compose.yaml 2>/dev/null; then
              python3 - << 'INNERPY'
          import yaml, sys

          with open('docker-compose.yaml', 'r') as f:
              dc = yaml.safe_load(f) or {}

          if 'services' not in dc:
              dc['services'] = {}

          # Redis-Service hinzufügen
          dc['services']['redis'] = {
              'image': 'redis:7-alpine',
              'restart': 'unless-stopped',
              'volumes': ['redis_data:/data'],
              'healthcheck': {
                  'test': ['CMD', 'redis-cli', 'ping'],
                  'interval': '10s',
                  'timeout': '3s',
                  'retries': 3,
              }
          }

          # Volume deklarieren
          if 'volumes' not in dc:
              dc['volumes'] = {}
          dc['volumes']['redis_data'] = None

          with open('docker-compose.yaml', 'w') as f:
              yaml.dump(dc, f, default_flow_style=False, allow_unicode=True)

          print('Redis-Service hinzugefügt')
          INNERPY
            else
              echo 'Redis bereits in docker-compose.yaml vorhanden'
            fi
          "

          echo "=== 5. Firewall-Ports öffnen ==="
          ssh_cmd "
            ufw allow 3478/udp  comment 'TURN UDP'  2>/dev/null || true
            ufw allow 5349/tcp  comment 'TURN TLS'  2>/dev/null || true
            ufw allow 80/tcp    comment 'certbot'   2>/dev/null || true
            echo 'Firewall-Status:'
            ufw status numbered 2>/dev/null | head -20 || true
          "

          echo "=== 6. Docker Compose neu starten ==="
          ssh_cmd "
            cd $LIVEKIT_DIR
            docker compose pull redis 2>/dev/null || docker-compose pull redis 2>/dev/null || true
            docker compose down
            docker compose up -d
            sleep 5
            echo 'Container-Status:'
            docker compose ps
          "

          echo "=== 7. LiveKit-Verbindungstest ==="
          ssh_cmd "
            sleep 3
            if docker compose ps | grep -q 'livekit.*Up'; then
              echo '✅ LiveKit läuft'
            else
              echo '⚠️  LiveKit nicht gestartet – Logs:'
              docker compose logs --tail=20 livekit
            fi
            if docker compose ps | grep -q 'redis.*Up'; then
              echo '✅ Redis läuft'
            else
              echo '⚠️  Redis nicht gestartet'
            fi
          "

      - name: Zusammenfassung
        run: |
          echo "## VPS-Konfiguration abgeschlossen" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **VPS:** $VPS_IP" >> $GITHUB_STEP_SUMMARY
          echo "- **TURN Domain:** $TURN_DOMAIN" >> $GITHUB_STEP_SUMMARY
          echo "- **Redis:** redis:6379 (intern)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Nächste Schritte" >> $GITHUB_STEP_SUMMARY
          echo "1. DNS-Propagation abwarten (~5 Min)" >> $GITHUB_STEP_SUMMARY
          echo "2. LiveKit testen: \`wss://livekit.srv1438024.hstgr.cloud\`" >> $GITHUB_STEP_SUMMARY
          echo "3. TURN testen: \`turn:turn.mensaena.de:3478\`" >> $GITHUB_STEP_SUMMARY
