name: 🚀 Shorebird OTA Patch

# Mensaena-Pendant zum Weltenbibliothek-Pattern (eigenes Repo, eigene
# Secrets, eigene Tabelle). Pusht einen Dart-only Patch auf das aktuelle
# Shorebird-Release damit installierte 2.0.0+20000-User die Änderungen
# beim nächsten Launch automatisch holen.
#
# Wann benutzen:
#   • Nach Dart-Code-Änderungen (lib/**) die KEINE neue native Lib brauchen
#   • Dependencies/Plugins dürfen NICHT geändert werden (= neuer Release nötig)

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch mit dem zu patchenden Code'
        required: false
        default: 'main'
  # Auto-Patch bei JEDEM Push auf main mit Dart-Änderung. Doppelte Patches
  # (gleicher Code) sind harmlos — der Client ignoriert sie.
  push:
    branches:
      - main
    paths:
      - 'flutter_app/**'

permissions:
  contents: read

# Patches dürfen NICHT parallel laufen — Shorebird nimmt den zuletzt
# hochgeladenen Patch als aktiv. Pro Branch nur ein Patch gleichzeitig,
# ältere laufende Jobs werden beim neuen Push gecancelt.
concurrency:
  group: shorebird-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    name: 📡 Shorebird Patch android
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_branch || github.sha }}

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Pinned wie Weltenbibliothek: ohne Pin driftet setup-shorebird@v1 auf
      # die jeweils neueste CLI und damit auf einen anderen Flutter-Engine-
      # Snapshot — Patches uploaden dann zwar erfolgreich, werden aber vom
      # Client auf dem Gerät still verworfen weil die Engine-Bytes nicht zum
      # registrierten Release passen.
      - name: 🐦 Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          shorebird-version: 1.6.92

      - name: 📋 Version lesen
        id: version
        run: |
          FULL=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | tr -d '[:space:]')
          SHORT=$(echo "$FULL" | sed 's/+.*//')
          BUILD=$(echo "$FULL" | sed 's/.*+//')
          echo "full=$FULL"   >> $GITHUB_OUTPUT
          echo "short=$SHORT" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "App-Version: $FULL"

      # ── Signing: Keystore aus Secrets wiederherstellen ───────────────────
      # `shorebird patch android` baut intern eine AAB für Engine-Diffing.
      # Ohne Release-Signing schlägt der AAB-Build fehl. android/app/
      # build.gradle.kts ist im Repo und liest key.properties — wir füllen
      # nur das key.properties + den Keystore-Pfad zur Laufzeit.
      - name: 🔐 Validate Android signing secrets
        env:
          KS_B64:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for var in KS_B64 KS_PASS KEY_ALIAS KEY_PASS; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::ANDROID_${var#KS_} fehlt"
              missing=1
            fi
          done
          exit $missing

      - name: 🔐 Restore keystore from secret
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          python3 -c "import os,base64,re,sys; raw=os.environ['KS_B64']; clean=re.sub(r'[^A-Za-z0-9+/=]','',raw).rstrip('='); d=base64.b64decode(clean+'='*(-len(clean)%4)); open(os.path.join(os.environ['RUNNER_TEMP'],'signing','mensaena.jks'),'wb').write(d); valid=d[:4]==b'\xfe\xed\xfe\xed' or d[:2]==b'\x30\x82'; print('Keystore:',len(d),'bytes valid=',valid); sys.exit('Invalid keystore – ANDROID_KEYSTORE_BASE64 ist korrupt') if not valid else None"

      - name: 🔐 Write key.properties
        env:
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${KS_PASS}
          keyPassword=${KEY_PASS}
          keyAlias=${KEY_ALIAS}
          storeFile=${RUNNER_TEMP}/signing/mensaena.jks
          EOF

      - name: 🩺 Shorebird-Status + Release-Check
        id: status
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
          FULL: ${{ steps.version.outputs.full }}
        run: |
          if [ -z "$SHOREBIRD_TOKEN" ]; then
            echo "::error::SHOREBIRD_TOKEN secret fehlt — kein Patch möglich"
            exit 1
          fi
          echo "── shorebird --version ──"
          shorebird --version || true
          echo "── shorebird releases list --platforms=android ──"
          RELEASES=$(shorebird releases list --platforms=android 2>&1 || true)
          echo "$RELEASES"

          # Wenn kein Release für die aktuelle pubspec-Version existiert, skippen.
          # → Verhindert noisy Failure wenn Version-Bump (z.B. force-update auf
          #   neue APK-Version) gepusht wird bevor shorebird_release.yml lief.
          if ! echo "$RELEASES" | grep -q "$FULL"; then
            echo "::warning::Kein Shorebird-Release für $FULL — skip patch."
            echo "::warning::Trigger shorebird_release.yml einmalig für initiales Release."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── Patch (kein hybrider release-or-patch) ──────────────────────────
      # Weltenbibliothek-Pattern: Wenn das Release noch nicht existiert,
      # läuft separate `shorebird_release.yml` (workflow_dispatch one-shot).
      # Hier wird IMMER nur gepatcht.
      - name: 📡 Patch veröffentlichen
        id: patch
        if: steps.status.outputs.skip != 'true'
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          set -euo pipefail
          echo "Ziel-Release-Version: ${{ steps.version.outputs.full }}"
          shorebird patch android \
            --release-version="${{ steps.version.outputs.full }}" \
            --no-confirm \
            --allow-asset-diffs \
            -- \
            --target-platform=android-arm64,android-arm \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://huaqldjkgyosefzfhjnf.supabase.co' }} \
            --dart-define=API_BASE_URL=https://www.mensaena.de
          echo "✅ Patch an Release ${{ steps.version.outputs.full }} gesendet"

      # ── Changelog in app_releases-Tabelle (Mensaena-spezifisch) ─────────
      # Pendant zu Weltenbibliothek's app_config + update_history. Mensaena
      # konsolidiert beides in der app_releases-Tabelle, die der Flutter-
      # WhatsNewSheet ausliest.
      #
      # Verwendet Supabase PostgREST mit SERVICE_ROLE_KEY (bypasst RLS) statt
      # psql/pooler — robust gegen IPv6/Pooler-Probleme.
      - name: 📝 Changelog in app_releases schreiben
        if: success() && steps.status.outputs.skip != 'true'
        env:
          SUPABASE_URL: https://huaqldjkgyosefzfhjnf.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FULL: ${{ steps.version.outputs.full }}
          BUILD: ${{ steps.version.outputs.build }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY nicht gesetzt — überspringe app_releases insert"
            exit 0
          fi

          TITLE=$(git log -1 --pretty=%s | sed 's/^[a-z]*([a-z]*): //' | head -c 100)
          BODY=$(git log -1 --pretty=%b | head -c 240 | tr '\n' ' ')

          # Patches sind nie mandatory — Force-Update läuft über APK-Release
          # (siehe flutter.yml).
          PAYLOAD=$(jq -n \
            --arg v "$FULL" \
            --argjson b "$BUILD" \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            '{
              version: $v,
              build_number: $b,
              mandatory: false,
              is_patch: true,
              apk_url: null,
              platform: "android",
              changelog: { entries: [{ type: "improvement", title: $title, description: $body }] }
            }')

          HTTP_CODE=$(curl -sS -o /tmp/ar_resp.json -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/app_releases?on_conflict=version" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ app_releases-Eintrag für $FULL (Patch) gespeichert."
          else
            echo "::error::app_releases-Insert fehlgeschlagen (HTTP $HTTP_CODE)"
            cat /tmp/ar_resp.json || true
            exit 1
          fi
