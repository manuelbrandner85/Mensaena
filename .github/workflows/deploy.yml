name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://huaqldjkgyosefzfhjnf.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1YXFsZGprZ3lvc2VmemZoam5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODcxMTgsImV4cCI6MjA5MDU2MzExOH0.Q5ciM8f--f1xAsKyr9-hv1mz7GGbJ6vbxPe4Cj5mgYE
          NEXT_PUBLIC_APP_NAME: Mensaena
          NEXT_PUBLIC_APP_URL: https://www.mensaena.de
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Validate Cloudflare token
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error title=Missing secret::CLOUDFLARE_API_TOKEN fehlt (Repo → Settings → Secrets and variables → Actions)."
            exit 1
          fi

      # ── Diagnose: Token-Permissions live verifizieren ──────────────────
      # Cloudflare 10000 ist generisches "auth failed" – wir wollen wissen
      # ob das wirklich Permissions sind oder zB Account-ID-Mismatch.
      - name: Diagnose Cloudflare token
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "── Token verify ──"
          curl -fsS -X GET https://api.cloudflare.com/client/v4/user/tokens/verify \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            | python3 -m json.tool
          echo ""
          echo "── Account access (only this token can see) ──"
          curl -fsS -X GET https://api.cloudflare.com/client/v4/accounts \
            -H "Authorization: Bearer $CF_TOKEN" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps([{'id':a['id'],'name':a['name']} for a in d.get('result',[])], indent=2))"
          echo ""
          echo "── Configured CLOUDFLARE_ACCOUNT_ID (last 6) ──"
          echo "...${CF_ACCOUNT: -6}"
          echo ""
          echo "── Worker 'mensaena' lookup on configured account ──"
          # Liefert 200 wenn Worker existiert, 404 wenn nicht (beides ok), 403/401 = Permission-Problem
          curl -sS -o /tmp/worker.json -w "HTTP %{http_code}\n" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/services/mensaena" \
            -H "Authorization: Bearer $CF_TOKEN"
          cat /tmp/worker.json | python3 -m json.tool || cat /tmp/worker.json

      - name: Deploy to Cloudflare Workers
        # account_id ist in wrangler.toml gesetzt (3472f5994537c3a30c5caeaff4de21fb) –
        # CLOUDFLARE_ACCOUNT_ID Secret wird nicht mehr benötigt.
        # open-next.config.ts wird umbenannt damit wrangler 4.x das Projekt NICHT als
        # OpenNext erkennt und opennextjs-cloudflare deploy aufruft (→ edge-preview 10000).
        run: |
          mv open-next.config.ts _open-next.config.ts.ci-skip
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_SEND_METRICS: "false"
