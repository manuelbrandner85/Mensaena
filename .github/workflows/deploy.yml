name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://huaqldjkgyosefzfhjnf.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1YXFsZGprZ3lvc2VmemZoam5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODcxMTgsImV4cCI6MjA5MDU2MzExOH0.Q5ciM8f--f1xAsKyr9-hv1mz7GGbJ6vbxPe4Cj5mgYE
          NEXT_PUBLIC_APP_NAME: Mensaena
          NEXT_PUBLIC_APP_URL: https://www.mensaena.de
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Validate Cloudflare token
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error title=Missing secret::CLOUDFLARE_API_TOKEN fehlt (Repo → Settings → Secrets and variables → Actions)."
            exit 1
          fi

      # ── Supabase DB-Migrationen automatisch anwenden ────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref huaqldjkgyosefzfhjnf
          supabase db push
          echo "Migrationen erfolgreich angewendet."

      - name: Deploy to Cloudflare Workers
        # account_id ist in wrangler.toml gesetzt (3472f5994537c3a30c5caeaff4de21fb) –
        # CLOUDFLARE_ACCOUNT_ID Secret wird nicht mehr benötigt.
        # open-next.config.ts wird umbenannt damit wrangler 4.x das Projekt NICHT als
        # OpenNext erkennt und opennextjs-cloudflare deploy aufruft (→ edge-preview 10000).
        run: |
          mv open-next.config.ts _open-next.config.ts.ci-skip
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_SEND_METRICS: "false"
