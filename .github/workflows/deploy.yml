name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://huaqldjkgyosefzfhjnf.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1YXFsZGprZ3lvc2VmemZoam5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODcxMTgsImV4cCI6MjA5MDU2MzExOH0.Q5ciM8f--f1xAsKyr9-hv1mz7GGbJ6vbxPe4Cj5mgYE
          NEXT_PUBLIC_APP_NAME: Mensaena
          NEXT_PUBLIC_APP_URL: https://www.mensaena.de
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Validate Cloudflare secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          if [ -z "$CF_TOKEN" ]; then
            echo "::error title=Missing secret::CLOUDFLARE_API_TOKEN fehlt (Repo → Settings → Secrets and variables → Actions). Token mit Edit-Recht auf Workers Scripts in Cloudflare Dashboard → My Profile → API Tokens erstellen."
            missing=1
          fi
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error title=Missing secret::CLOUDFLARE_ACCOUNT_ID fehlt. Aus dem Cloudflare Dashboard rechts oben kopierbar."
            missing=1
          fi
          exit $missing

      - name: Deploy to Cloudflare Workers
        # wrangler 4.x erkennt open-next.config.ts und leitet automatisch auf
        # `opennextjs-cloudflare deploy` weiter → ruft getPlatformProxy auf →
        # braucht Workers Subdomain Edit Permission (edge-preview API) → 10000.
        # Fix: open-next.config.ts umbenennen damit wrangler es als normalen
        # Worker behandelt. Build-Artefakte (.open-next/) sind bereits vorhanden.
        run: |
          mv open-next.config.ts _open-next.config.ts.ci-skip
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
