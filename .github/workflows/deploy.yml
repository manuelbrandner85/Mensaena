name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Apply Supabase Migrations
        run: bash scripts/apply-migrations.sh
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.huaqldjkgyosefzfhjnf.supabase.co:5432/postgres?sslmode=require

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: p4cO2neOtyGQykWkmG2Rl_iVCOO2uW9aIaisVJ48
          CLOUDFLARE_ACCOUNT_ID: accac25964381d7a5200932dac6d270d
