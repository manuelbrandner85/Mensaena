name: Supabase Migrations & Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── Resolve + sanitize project ref ──────────────────────────────────
      # User kann die SUPABASE_PROJECT_REF als Variable ODER als Secret
      # angelegt haben. Wir akzeptieren beide Quellen, strippen Whitespace
      # und akzeptieren auch wenn der User aus Versehen die ganze URL gepastet hat
      # (https://huaqldjkgyosefzfhjnf.supabase.co → huaqldjkgyosefzfhjnf).
      - name: Resolve project ref
        id: ref
        env:
          REF_VAR:    ${{ vars.SUPABASE_PROJECT_REF }}
          REF_SECRET: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          raw="${REF_VAR:-$REF_SECRET}"
          if [ -z "$raw" ]; then
            echo "::error title=Missing project ref::Setze entweder Repository-Variable ODER Secret namens SUPABASE_PROJECT_REF (Wert: 20 Kleinbuchstaben, z.B. huaqldjkgyosefzfhjnf)"
            exit 1
          fi
          # Whitespace, https://, .supabase.co, /-Slashes wegputzen
          ref=$(echo "$raw" | tr -d '[:space:]' | sed -E 's|https?://||; s|\.supabase\.co.*||; s|/.*||' | tr 'A-Z' 'a-z')
          if ! echo "$ref" | grep -Eq '^[a-z]{20}$'; then
            echo "::error title=Invalid project ref::Format muss exakt 20 Kleinbuchstaben sein. Bekommen: '$ref' (aus '$raw')"
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Project ref OK: $ref"

      - name: Validate required secrets
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=0
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error title=Missing secret::SUPABASE_ACCESS_TOKEN fehlt. Anlegen unter supabase.com/dashboard/account/tokens"
            missing=1
          fi
          if [ -z "$DB_PASSWORD" ]; then
            echo "::error title=Missing secret::SUPABASE_DB_PASSWORD fehlt (Dashboard → Project settings → Database → Connection string)"
            missing=1
          fi
          exit $missing

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link \
            --project-ref "${{ steps.ref.outputs.ref }}" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          # Use PGPASSWORD env var; psql picks it up automatically.
          PGURL="postgresql://postgres@db.${REF}.supabase.co:5432/postgres?sslmode=require"

          # Helper: query DB, return one version per line (never fails).
          db_versions() {
            psql "$PGURL" -t -A -c "$1" 2>/dev/null | grep -E '^[0-9]{14}' || true
          }

          # Local migration versions derived from filenames.
          LOCAL=$(find supabase/migrations -maxdepth 1 -name '*.sql' \
            | sed 's|.*/\([0-9]*\)_.*|\1|' | grep -E '^[0-9]{14}' | sort -u || true)

          # ── 1. Remove remote tracking entries that have no local file ──────
          REMOTE=$(db_versions \
            "SELECT version FROM supabase_migrations.schema_migrations ORDER BY version")
          REMOVED=0
          while IFS= read -r v; do
            [ -z "$v" ] && continue
            if ! echo "$LOCAL" | grep -qx "$v"; then
              echo "  Removing orphaned tracking entry: $v"
              psql "$PGURL" -c \
                "DELETE FROM supabase_migrations.schema_migrations WHERE version = '$v'" \
                >/dev/null
              REMOVED=$((REMOVED + 1))
            fi
          done <<< "$REMOTE"
          echo "Orphaned entries removed: $REMOVED"

          # ── 2. Apply genuinely new local migrations ────────────────────────
          TRACKED=$(db_versions \
            "SELECT version FROM supabase_migrations.schema_migrations")
          APPLIED=0
          while IFS= read -r v; do
            [ -z "$v" ] && continue
            if ! echo "$TRACKED" | grep -qx "$v"; then
              sqlfile=$(find supabase/migrations -maxdepth 1 -name "${v}_*.sql" | head -1)
              [ -z "$sqlfile" ] && continue
              echo "── Applying new migration: $v"
              psql "$PGURL" -f "$sqlfile" 2>&1 | tail -10 || true
              psql "$PGURL" -c \
                "INSERT INTO supabase_migrations.schema_migrations (version) \
                 VALUES ('$v') ON CONFLICT DO NOTHING" >/dev/null
              echo "✅ Tracked: $v"
              APPLIED=$((APPLIED + 1))
            fi
          done <<< "$LOCAL"
          echo "✅ Migration push complete – $APPLIED new migration(s) applied."

      # ── FCM Service-Account → private.push_config ────────────────────────
      # Synct den Firebase Service-Account (für FCM HTTP v1 API) in die
      # private.push_config Tabelle. Die send-push Edge Function lädt den
      # JSON beim Cold-Start und nutzt ihn zum JWT-Signieren.
      #
      # ACHTUNG: Das ist NICHT die google-services.json (die landet in der APK
      # via GOOGLE_SERVICES_JSON in android.yml). Das hier ist die separate
      # service-account.json aus:
      #   Firebase Console → Projekteinstellungen → Dienstkonten
      #   → "Neuen privaten Schlüssel generieren" → JSON download
      #
      # Wenn FCM_SERVICE_ACCOUNT_JSON nicht gesetzt ist, läuft nur Web-Push
      # (VAPID) – Android-APK-User bekommen dann keine Push-Benachrichtigungen.
      - name: Sync FCM service-account into private.push_config
        env:
          REF: ${{ steps.ref.outputs.ref }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FCM_SERVICE_ACCOUNT_JSON" ]; then
            echo "::notice title=FCM not configured::FCM_SERVICE_ACCOUNT_JSON Secret nicht gesetzt. Web-Push (VAPID) funktioniert; Android-APK-Push via FCM bleibt deaktiviert. Zum Aktivieren: Firebase Console -> Projekteinstellungen -> Dienstkonten -> JSON generieren -> Repo Settings -> Secrets -> FCM_SERVICE_ACCOUNT_JSON."
            exit 0
          fi
          pip install --quiet psycopg2-binary
          python3 <<'PYEOF'
          import json, os, sys, psycopg2

          raw = os.environ['FCM_SERVICE_ACCOUNT_JSON']
          try:
              sa = json.loads(raw)
          except Exception as e:
              sys.exit(f'::error title=Invalid JSON::FCM_SERVICE_ACCOUNT_JSON ist kein gueltiges JSON: {e}')

          if sa.get('type') != 'service_account':
              sys.exit(
                  f'::error title=Wrong JSON type::type={sa.get("type")!r}, erwartet "service_account". '
                  'Lade die Datei aus Firebase Console -> Projekteinstellungen -> '
                  'Dienstkonten -> "Neuen privaten Schluessel generieren". '
                  'NICHT google-services.json verwenden!'
              )
          for field in ('private_key', 'client_email', 'project_id'):
              if not sa.get(field):
                  sys.exit(f'::error title=Missing field::Service-Account fehlt Pflichtfeld {field!r}')

          project_id = sa['project_id']
          print(f'  service-account: {sa["client_email"]}')
          print(f'  project_id     : {project_id}')

          conn = psycopg2.connect(
              host=f'db.{os.environ["REF"]}.supabase.co',
              port=5432,
              user='postgres',
              password=os.environ['PGPASSWORD'],
              dbname='postgres',
              sslmode='require',
          )
          with conn:
              with conn.cursor() as cur:
                  for key, value in [
                      ('fcm_project_id', project_id),
                      ('fcm_service_account_json', raw),
                  ]:
                      cur.execute(
                          'INSERT INTO private.push_config (key, value, updated_at) '
                          'VALUES (%s, %s, NOW()) '
                          'ON CONFLICT (key) DO UPDATE '
                          'SET value = EXCLUDED.value, updated_at = NOW()',
                          (key, value),
                      )
                      print(f'  upserted {key} ({len(value)} bytes)')
          conn.close()
          print('FCM config synced into live DB.')
          PYEOF

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Alle Functions unter supabase/functions/* einzeln deployen.
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            # Ignoriere versteckte Helfer-Ordner wie _shared
            [[ "$name" == _* ]] && continue
            echo "── Deploying $name ──"
            supabase functions deploy "$name" --no-verify-jwt || {
              echo "::error title=Function deploy failed::$name konnte nicht deployed werden"
              exit 1
            }
          done
