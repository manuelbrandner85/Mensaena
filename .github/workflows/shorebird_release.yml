name: 🐦 Shorebird Initial Release

# One-Shot: Erstellt das initiale Shorebird-Release für die aktuelle
# pubspec-Version. Nur manuell triggerbar (workflow_dispatch).
#
# Wann benutzen:
#   • Initiales Release pro Major.Minor-Version (z.B. wenn build_number
#     in pubspec von 20000 auf 30000 hochgeht).
#   • shorebird_patch.yml schlägt fehl mit "no release for version X".
#
# Danach übernimmt shorebird_patch.yml automatisch alle Push-zu-main-
# Trigger und pusht Dart-only Patches an dieses Release.

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch von dem das Release gebaut wird'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: shorebird-release
  cancel-in-progress: false

jobs:
  release:
    name: 🐦 Shorebird Release android
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_branch || 'main' }}

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          shorebird-version: 1.6.92

      - name: 📋 Version lesen
        id: version
        run: |
          FULL=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | tr -d '[:space:]')
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "App-Version: $FULL"

      - name: 🔐 Validate Android signing secrets
        env:
          KS_B64:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for var in KS_B64 KS_PASS KEY_ALIAS KEY_PASS; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::ANDROID_${var#KS_} fehlt"
              missing=1
            fi
          done
          exit $missing

      - name: 🔐 Restore keystore from secret
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          python3 -c "import os,base64,re,sys; raw=os.environ['KS_B64']; clean=re.sub(r'[^A-Za-z0-9+/=]','',raw).rstrip('='); d=base64.b64decode(clean+'='*(-len(clean)%4)); open(os.path.join(os.environ['RUNNER_TEMP'],'signing','mensaena.jks'),'wb').write(d); valid=d[:4]==b'\xfe\xed\xfe\xed' or d[:2]==b'\x30\x82'; print('Keystore:',len(d),'bytes valid=',valid); sys.exit('Invalid keystore – ANDROID_KEYSTORE_BASE64 ist korrupt') if not valid else None"

      - name: 🔐 Write key.properties
        env:
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${KS_PASS}
          keyPassword=${KEY_PASS}
          keyAlias=${KEY_ALIAS}
          storeFile=${RUNNER_TEMP}/signing/mensaena.jks
          EOF

      - name: 🔥 Restore google-services.json (Firebase / FCM)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret fehlt — FCM-Build schlägt fehl"
            exit 1
          fi
          mkdir -p android/app
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          python3 -c "import json; json.load(open('android/app/google-services.json'))" \
            && echo "google-services.json OK"

      - name: 🩺 Shorebird-Status (vor Release)
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          if [ -z "$SHOREBIRD_TOKEN" ]; then
            echo "::error::SHOREBIRD_TOKEN secret fehlt — kein Release möglich"
            exit 1
          fi
          echo "── shorebird --version ──"
          shorebird --version || true
          echo "── shorebird releases list --platforms=android (vor Release) ──"
          shorebird releases list --platforms=android 2>&1 || true

      - name: 🐦 Initiales Release veröffentlichen
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          set -euo pipefail
          echo "Erstelle Shorebird-Release für ${{ steps.version.outputs.full }}"
          shorebird release android \
            --no-confirm \
            -- \
            --target-platform=android-arm64,android-arm \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://huaqldjkgyosefzfhjnf.supabase.co' }} \
            --dart-define=API_BASE_URL=https://www.mensaena.de
          echo "✅ Release ${{ steps.version.outputs.full }} angelegt — shorebird_patch.yml kann ab jetzt patchen."

      - name: 🩺 Shorebird-Status (nach Release)
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          echo "── shorebird releases list --platforms=android (nach Release) ──"
          shorebird releases list --platforms=android 2>&1 || true
