name: DNS LiveKit Auto

on:
  push:
    branches:
      - '_run/setup-vps-now'
  workflow_dispatch:

jobs:
  add-dns-record:
    runs-on: ubuntu-latest
    steps:
      - name: Add A-Record livekit.mensaena.de
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DOMAIN=mensaena.de
          SUBDOMAIN=livekit
          IP=72.62.154.95

          echo "=== Find Zone-ID ==="
          ZONE_ID=$(curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/zones?name=$DOMAIN" | jq -r '.result[0].id // empty')
          echo "Zone-ID: $ZONE_ID"
          if [ -z "$ZONE_ID" ]; then echo "FEHLER: Zone nicht gefunden"; exit 1; fi

          echo ""
          echo "=== Existierende Records ==="
          EXISTING=$(curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$SUBDOMAIN.$DOMAIN&type=A" | jq -r '.result[0].id // empty')
          echo "Existing: '$EXISTING'"

          PAYLOAD='{"type":"A","name":"'$SUBDOMAIN'","content":"'$IP'","ttl":300,"proxied":false}'
          echo ""
          if [ -n "$EXISTING" ]; then
            echo "=== Update record $EXISTING ==="
            curl -s -X PUT -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$EXISTING" -d "$PAYLOAD" | jq .
          else
            echo "=== Create new record ==="
            curl -s -X POST -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" -d "$PAYLOAD" | jq .
          fi

          echo ""
          echo "=== DNS-Lookup-Test ==="
          sleep 5
          dig +short $SUBDOMAIN.$DOMAIN @1.1.1.1
          dig +short $SUBDOMAIN.$DOMAIN @8.8.8.8
