name: DNS LiveKit Auto

on:
  push:
    branches:
      - '_run/setup-vps-now'
  workflow_dispatch:

jobs:
  add-dns-record:
    runs-on: ubuntu-latest
    steps:
      - name: Add A-Record livekit.mensaena.de
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DOMAIN="mensaena.de"
          SUBDOMAIN="livekit"
          IP="72.62.154.95"

          echo "=== Find Zone-ID ==="
          ZONE_RESP=$(curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=$DOMAIN")
          echo "$ZONE_RESP" | head -c 500
          echo ""

          ZONE_ID=$(echo "$ZONE_RESP" | python3 -c "
import json,sys
d=json.load(sys.stdin)
print(d.get('result',[{}])[0].get('id','') if d.get('result') else '')")
          echo "Zone-ID: $ZONE_ID"

          if [ -z "$ZONE_ID" ]; then
            echo "FEHLER: Zone $DOMAIN nicht gefunden. Token braucht Zone:Read fuer mensaena.de"
            exit 1
          fi

          echo ""
          echo "=== Existierende Records ==="
          LIST_RESP=$(curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$SUBDOMAIN.$DOMAIN&type=A")
          echo "$LIST_RESP" | head -c 500
          echo ""

          EXISTING=$(echo "$LIST_RESP" | python3 -c "
import json,sys
try:
  d=json.load(sys.stdin)
  res=d.get('result',[])
  print(res[0].get('id','') if res else '')
except: print('')")
          echo "Existing record ID: '$EXISTING'"

          echo ""
          if [ -n "$EXISTING" ]; then
            echo "=== Update existierenden Record (ID: $EXISTING) ==="
            curl -s -X PUT \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$EXISTING" \
              -d "{\"type\":\"A\",\"name\":\"$SUBDOMAIN\",\"content\":\"$IP\",\"ttl\":300,\"proxied\":false}"
          else
            echo "=== Anlegen neuer Record ==="
            curl -s -X POST \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -d "{\"type\":\"A\",\"name\":\"$SUBDOMAIN\",\"content\":\"$IP\",\"ttl\":300,\"proxied\":false}"
          fi
          echo ""

          echo ""
          echo "=== DNS-Lookup-Test ==="
          sleep 5
          dig +short $SUBDOMAIN.$DOMAIN @1.1.1.1 || true
          dig +short $SUBDOMAIN.$DOMAIN @8.8.8.8 || true
