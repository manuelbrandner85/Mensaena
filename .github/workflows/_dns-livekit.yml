name: DNS LiveKit Auto

on:
  push:
    branches:
      - '_run/setup-vps-now'
  workflow_dispatch:

jobs:
  add-dns-record:
    runs-on: ubuntu-latest
    steps:
      - name: Add A-Record livekit.mensaena.de v3
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          DOMAIN=mensaena.de
          SUBDOMAIN=livekit
          IP=72.62.154.95

          if [ -z "$CF_TOKEN" ]; then
            echo "FEHLER: CLOUDFLARE_API_TOKEN secret nicht gesetzt"
            exit 1
          fi

          echo "=== Token verifizieren ==="
          curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/user/tokens/verify" | jq -r '.success, .messages'

          echo ""
          echo "=== Find Zone-ID ==="
          ZONE_ID=$(curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/zones?name=$DOMAIN" | jq -r '.result[0].id // empty')
          echo "Zone-ID: $ZONE_ID"
          if [ -z "$ZONE_ID" ]; then
            echo "Token hat KEINE Zone:Read Berechtigung fuer $DOMAIN. Liste sichtbare Zonen:"
            curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/zones" | jq -r '.result[] | "\(.name) -> \(.id)"'
            exit 1
          fi

          echo ""
          echo "=== Existierende Records ==="
          EXISTING=$(curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$SUBDOMAIN.$DOMAIN&type=A" | jq -r '.result[0].id // empty')

          PAYLOAD="{\"type\":\"A\",\"name\":\"$SUBDOMAIN\",\"content\":\"$IP\",\"ttl\":300,\"proxied\":false}"

          if [ -n "$EXISTING" ]; then
            echo "=== Update record $EXISTING ==="
            RESULT=$(curl -s -X PUT -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$EXISTING" -d "$PAYLOAD")
          else
            echo "=== Create new record ==="
            RESULT=$(curl -s -X POST -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" -d "$PAYLOAD")
          fi
          echo "$RESULT" | jq .

          SUCCESS=$(echo "$RESULT" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "FEHLER: DNS-Record konnte nicht gesetzt werden"
            exit 1
          fi

          echo ""
          echo "=== DNS-Lookup-Test (5s warten) ==="
          sleep 5
          dig +short $SUBDOMAIN.$DOMAIN @1.1.1.1
          dig +short $SUBDOMAIN.$DOMAIN @8.8.8.8
          echo ""
          echo "DNS sollte spaetestens in 60s ueberall propagiert sein."
