name: DNS LiveKit Auto

on:
  push:
    branches:
      - '_run/setup-vps-now'
  workflow_dispatch:

jobs:
  add-dns-record:
    runs-on: ubuntu-latest
    steps:
      - name: Add A-Record livekit.mensaena.de
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DOMAIN="mensaena.de"
          SUBDOMAIN="livekit"
          IP="72.62.154.95"

          echo "=== Verify token ==="
          curl -sf -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            | python3 -m json.tool | head -10

          echo ""
          echo "=== Find Zone-ID ==="
          ZONE_ID=$(curl -sf -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=$DOMAIN" \
            | python3 -c "import json,sys;d=json.load(sys.stdin);print(d['result'][0]['id'] if d.get('result') else '')")
          echo "Zone-ID: $ZONE_ID"

          if [ -z "$ZONE_ID" ]; then
            echo "FEHLER: Zone $DOMAIN nicht gefunden"
            exit 1
          fi

          echo ""
          echo "=== Existierende Records pruefen ==="
          EXISTING=$(curl -sf -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$SUBDOMAIN.$DOMAIN&type=A" \
            | python3 -c "import json,sys;d=json.load(sys.stdin);print(d['result'][0]['id'] if d.get('result') else '')")

          if [ -n "$EXISTING" ]; then
            echo "Existiert bereits (ID: $EXISTING) – update auf $IP, proxied=false"
            curl -sf -X PUT \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$EXISTING" \
              -d "{\"type\":\"A\",\"name\":\"$SUBDOMAIN\",\"content\":\"$IP\",\"ttl\":300,\"proxied\":false}" \
              | python3 -m json.tool | head -15
          else
            echo "Neu anlegen: $SUBDOMAIN.$DOMAIN -> $IP (DNS only)"
            curl -sf -X POST \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -d "{\"type\":\"A\",\"name\":\"$SUBDOMAIN\",\"content\":\"$IP\",\"ttl\":300,\"proxied\":false}" \
              | python3 -m json.tool | head -15
          fi

          echo ""
          echo "=== DNS-Lookup-Test ==="
          sleep 5
          host $SUBDOMAIN.$DOMAIN || echo "DNS noch nicht propagiert (Cloudflare ist normalerweise sofort)"
          dig +short $SUBDOMAIN.$DOMAIN @1.1.1.1
