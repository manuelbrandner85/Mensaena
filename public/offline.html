<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Offline – Mensaena</title>
  <meta name="theme-color" content="#1EAAA6">
  <link rel="icon" href="/icons/icon-192x192.png" type="image/png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #EEF9F9;
      color: #1F2937;
      -webkit-font-smoothing: antialiased;
    }
    main {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #d0f5f3;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      box-shadow: 0 8px 24px -8px rgba(30, 170, 166, 0.4);
    }
    .icon svg {
      width: 40px;
      height: 40px;
      color: #147170;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      color: #4B5563;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 28rem;
      margin-bottom: 2rem;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 20rem;
    }
    button, a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: 0;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #1EAAA6;
      color: white;
    }
    .btn-primary:hover { background: #147170 }
    .btn-secondary {
      background: white;
      color: #4B5563;
      border: 1px solid #E5E7EB;
    }
    .btn-secondary:hover { background: #F9FAFB }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #9CA3AF;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #0F172A; color: #E5E7EB }
      h1 { color: #F9FAFB }
      p { color: #9CA3AF }
      .icon { background: rgba(30, 170, 166, 0.15) }
      .btn-secondary { background: #1F2937; color: #E5E7EB; border-color: #374151 }
      .btn-secondary:hover { background: #374151 }
    }
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
        <line x1="2" y1="2" x2="22" y2="22" stroke="#C62828"/>
      </svg>
    </div>

    <h1>Du bist offline</h1>
    <p>
      Mensaena braucht eine Internetverbindung, um Beiträge, Karten und Chats zu laden.
      Sobald du wieder online bist, geht's weiter.
    </p>

    <div class="actions">
      <button onclick="location.reload()" class="btn-primary" type="button">
        Erneut versuchen
      </button>
      <a href="/" class="btn-secondary">
        Zur Startseite
      </a>
    </div>

    <p class="hint">
      Krisendaten und letzte Beiträge sind im Cache verfügbar — versuche eine vorher besuchte Seite zu öffnen.
    </p>
  </main>

  <script>
    // Auto-reload sobald wieder online
    window.addEventListener('online', () => location.reload())
  </script>
</body>
</html>
